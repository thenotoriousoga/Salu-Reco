<style>
/* ===================================
   Salu-Rec - Design System
   Style: Vibrant & Block-based
   Colors: Team Red + Championship Gold
   Typography: Fira Sans / Fira Code
   =================================== */

@import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap');

/* --- リセット・ベース --- */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --primary: #DC2626;
  --primary-dark: #B91C1C;
  --secondary: #EF4444;
  --accent: #FBBF24;
  --accent-dark: #D97706;
  --bg: #FEF2F2;
  --bg-card: #FFFFFF;
  --bg-surface: #FFF5F5;
  --text: #7F1D1D;
  --text-secondary: #991B1B;
  --text-muted: #92400E;
  --border: #FECACA;
  --border-light: #FEE2E2;
  --team-a: #2563EB;
  --team-a-bg: #DBEAFE;
  --team-a-border: #93C5FD;
  --team-b: #DB2777;
  --team-b-bg: #FCE7F3;
  --team-b-border: #F9A8D4;
  --team-c: #059669;
  --team-c-bg: #D1FAE5;
  --team-c-border: #6EE7B7;
  --team-d: #D97706;
  --team-d-bg: #FEF3C7;
  --team-d-border: #FCD34D;
  --team-e: #7C3AED;
  --team-e-bg: #EDE9FE;
  --team-e-border: #C4B5FD;
  --success: #059669;
  --success-bg: #D1FAE5;
  --danger: #DC2626;
  --shadow-sm: 0 1px 3px rgba(127, 29, 29, 0.08);
  --shadow-md: 0 4px 12px rgba(127, 29, 29, 0.1);
  --shadow-lg: 0 8px 24px rgba(127, 29, 29, 0.12);
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --transition: 200ms ease;
}

body {
  font-family: 'Fira Sans', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 24px;
  -webkit-font-smoothing: antialiased;
  line-height: 1.6;
}

/* --- ヘッダー --- */
.header {
  background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 50%, var(--accent-dark) 100%);
  color: white;
  padding: 18px 20px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 20px rgba(220, 38, 38, 0.3);
}

.header h1 {
  font-family: 'Luckiest Guy', 'Fira Code', monospace;
  font-size: 1.4rem;
  font-weight: 400;
  letter-spacing: 0.04em;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  text-transform: uppercase;
}

.header-icon {
  width: 24px;
  height: 24px;
  fill: none;
  stroke: currentColor;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.header-logo {
  width: 32px;
  height: 32px;
  flex-shrink: 0;
}

.header-mic {
  width: 20px;
  height: 28px;
  flex-shrink: 0;
  margin-left: 1.5px;
  margin-top: -2px;
}

.header-inner {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  max-width: 600px;
  margin: 0 auto;
}

.btn-logout {
  position: absolute;
  right: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border: 2px solid rgba(255, 255, 255, 0.5);
  border-radius: var(--radius-xs);
  background: rgba(255, 255, 255, 0.15);
  color: white;
  cursor: pointer;
  transition: all var(--transition);
  padding: 0;
}

.btn-logout:hover {
  background: rgba(255, 255, 255, 0.3);
  border-color: rgba(255, 255, 255, 0.8);
}

.btn-logout:active {
  transform: scale(0.95);
}

.btn-logout svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* --- コンテンツ --- */
.content {
  max-width: 600px;
  margin: 0 auto;
  padding: 16px 12px;
}

.page { display: none; }
.page.active { display: block; }

/* --- カード --- */
.card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-md);
  border: 1px solid var(--border-light);
  transition: box-shadow var(--transition);
}

.card h2 {
  font-family: 'Fira Code', monospace;
  font-size: 1.15rem;
  font-weight: 700;
  margin-bottom: 16px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}

.card h2 .section-icon {
  width: 22px;
  height: 22px;
  stroke: var(--primary);
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  flex-shrink: 0;
}

.card h3 {
  font-size: 0.95rem;
  font-weight: 600;
  margin-bottom: 10px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 6px;
}

/* --- ボタン --- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 20px;
  border: none;
  border-radius: var(--radius-sm);
  font-family: 'Fira Sans', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  text-align: center;
  line-height: 1.4;
}

.btn:active { transform: scale(0.97); }

.btn-primary {
  background: var(--primary);
  color: white;
  box-shadow: 0 2px 8px rgba(220, 38, 38, 0.3);
}
.btn-primary:hover {
  background: var(--primary-dark);
  box-shadow: 0 4px 12px rgba(220, 38, 38, 0.4);
}

.btn-secondary {
  background: var(--border-light);
  color: var(--text);
}
.btn-secondary:hover {
  background: var(--border);
}

.btn-accent {
  background: var(--accent);
  color: var(--text);
  box-shadow: 0 2px 8px rgba(251, 191, 36, 0.3);
}
.btn-accent:hover {
  background: var(--accent-dark);
  color: white;
  box-shadow: 0 4px 12px rgba(251, 191, 36, 0.4);
}

.btn-danger {
  background: transparent;
  color: var(--danger);
  border: 1.5px solid var(--danger);
  padding: 6px 12px;
}
.btn-danger:hover {
  background: var(--danger);
  color: white;
}

.btn-large {
  display: flex;
  width: 100%;
  padding: 14px 20px;
  font-size: 1rem;
  margin-bottom: 10px;
  border-radius: var(--radius);
}

.btn-sm {
  padding: 8px 14px;
  font-size: 0.8rem;
  border-radius: var(--radius-xs);
  min-height: 44px;
  min-width: 44px;
}

.btn .btn-icon {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  flex-shrink: 0;
}

/* --- 入力 --- */
.input {
  width: 100%;
  padding: 10px 14px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: 'Fira Sans', sans-serif;
  font-size: 0.95rem;
  color: var(--text);
  background: var(--bg-card);
  transition: border-color var(--transition), box-shadow var(--transition);
  -webkit-appearance: none;
  appearance: none;
}

.input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.15);
}

.input-group {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  align-items: center;
}

.input-group label {
  font-size: 0.85rem;
  font-weight: 600;
  white-space: nowrap;
  min-width: 80px;
  color: var(--text-secondary);
}

.input-group .input {
  flex: 1;
}

/* --- メンバーリスト --- */
.member-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-light);
  transition: background var(--transition);
}

.member-item:last-child { border-bottom: none; }

.member-name {
  font-weight: 500;
  font-size: 0.95rem;
}

/* --- チェックボックスグリッド --- */
.checkbox-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin: 14px 0;
}

.checkbox-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: var(--bg-surface);
  border-radius: var(--radius-sm);
  border: 2px solid transparent;
  cursor: pointer;
  transition: all var(--transition);
}

.checkbox-item:hover {
  background: var(--border-light);
}

.checkbox-item:has(input:checked) {
  background: var(--success-bg);
  border-color: var(--success);
}

.checkbox-item input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: var(--success);
  cursor: pointer;
}

.checkbox-item label {
  font-size: 0.9rem;
  cursor: pointer;
  font-weight: 500;
}

/* --- ステップ --- */
.step-actions {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}

.step-nav {
  display: flex;
  gap: 8px;
  margin-top: 14px;
}

.step-nav .btn { flex: 1; }

/* --- チーム分け --- */
.team-name-inputs {
  margin-bottom: 14px;
}

.teams-preview {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px;
  margin: 14px 0;
}

.team-box {
  padding: 14px;
  border-radius: var(--radius-sm);
  min-height: 100px;
}

.team-box h4 {
  font-family: 'Fira Code', monospace;
  font-size: 0.85rem;
  font-weight: 700;
  margin-bottom: 10px;
  text-align: center;
  letter-spacing: -0.01em;
}

.team-a { background: var(--team-a-bg); border: 2px solid var(--team-a-border); }
.team-b { background: var(--team-b-bg); border: 2px solid var(--team-b-border); }
.team-c { background: var(--team-c-bg); border: 2px solid var(--team-c-border); }
.team-d { background: var(--team-d-bg); border: 2px solid var(--team-d-border); }
.team-e { background: var(--team-e-bg); border: 2px solid var(--team-e-border); }

/* チームカラーゾーン（チーム分けボード用） */
.team-a-zone { background: var(--team-a-bg); border-color: var(--team-a-border); }
.team-b-zone { background: var(--team-b-bg); border-color: var(--team-b-border); }
.team-c-zone { background: var(--team-c-bg); border-color: var(--team-c-border); }
.team-d-zone { background: var(--team-d-bg); border-color: var(--team-d-border); }
.team-e-zone { background: var(--team-e-bg); border-color: var(--team-e-border); }

/* 勝敗の視覚表示 */
.match-win { border: 2px solid var(--success); box-shadow: 0 0 0 1px var(--success); }
.match-lose { opacity: 0.6; }
.match-draw { border: 2px solid var(--border); }

.team-member {
  padding: 4px 0;
  font-size: 0.85rem;
  font-weight: 500;
}

/* --- スコアボード --- */
.scoreboard {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 24px 0;
  margin-bottom: 20px;
  background: linear-gradient(135deg, var(--bg-surface) 0%, var(--border-light) 100%);
  border-radius: var(--radius);
  border: 2px solid var(--border);
}

.score-team { text-align: center; flex: 1; }

.team-label {
  display: inline-block;
  font-family: 'Fira Code', monospace;
  font-size: 0.75rem;
  font-weight: 700;
  padding: 2px 10px;
  border-radius: var(--radius-xs);
  margin-bottom: 6px;
  letter-spacing: 0.02em;
  text-transform: uppercase;
}

/* チーム名バッジ（スコアボード・試合結果用） */
.team-label.team-a-badge { background: var(--team-a-bg); color: var(--team-a); border: 1px solid var(--team-a-border); }
.team-label.team-b-badge { background: var(--team-b-bg); color: var(--team-b); border: 1px solid var(--team-b-border); }
.team-label.team-c-badge { background: var(--team-c-bg); color: var(--team-c); border: 1px solid var(--team-c-border); }
.team-label.team-d-badge { background: var(--team-d-bg); color: var(--team-d); border: 1px solid var(--team-d-border); }
.team-label.team-e-badge { background: var(--team-e-bg); color: var(--team-e); border: 1px solid var(--team-e-border); }

.score {
  display: block;
  font-family: 'Fira Code', monospace;
  font-size: 3.5rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1;
  margin-bottom: 10px;
}

.score-vs {
  font-family: 'Fira Code', monospace;
  font-size: 1rem;
  font-weight: 700;
  color: var(--primary);
  background: var(--bg-card);
  width: 40px;
  height: 40px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-sm);
  border: 2px solid var(--border);
  flex-shrink: 0;
}

.score-btns {
  display: flex;
  gap: 6px;
  justify-content: center;
}

/* --- 得点者セクション --- */
.goal-section {
  margin-bottom: 20px;
  padding: 16px;
  background: var(--bg-surface);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-light);
}

.goal-section h3 .section-icon { width: 18px; height: 18px; }

.goal-player {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border-light);
}

.goal-player:last-child { border-bottom: none; }

.goal-player-name { font-size: 0.85rem; font-weight: 500; flex: 1; }

.goal-player-team {
  font-family: 'Fira Code', monospace;
  font-size: 0.65rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: var(--radius-xs);
  margin-right: 10px;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

.goal-player-team.team-a-badge { background: var(--team-a-bg); color: var(--team-a); border: 1px solid var(--team-a-border); }
.goal-player-team.team-b-badge { background: var(--team-b-bg); color: var(--team-b); border: 1px solid var(--team-b-border); }
.goal-player-team.team-c-badge { background: var(--team-c-bg); color: var(--team-c); border: 1px solid var(--team-c-border); }
.goal-player-team.team-d-badge { background: var(--team-d-bg); color: var(--team-d); border: 1px solid var(--team-d-border); }
.goal-player-team.team-e-badge { background: var(--team-e-bg); color: var(--team-e); border: 1px solid var(--team-e-border); }

.goal-count { display: flex; align-items: center; gap: 8px; }

.goal-count span {
  font-family: 'Fira Code', monospace;
  font-weight: 700;
  min-width: 24px;
  text-align: center;
  font-size: 1rem;
}

/* --- MVP --- */
.mvp-candidate {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px;
  margin: 8px 0;
  background: var(--bg-surface);
  border-radius: var(--radius-sm);
  border: 2px solid transparent;
  cursor: pointer;
  transition: all var(--transition);
}

.mvp-candidate:hover { background: var(--border-light); border-color: var(--border); }

.mvp-candidate.selected {
  background: #FFFBEB;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.2);
}

.mvp-result-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-light);
}

.mvp-result-item:first-child { font-weight: 700; font-size: 1.05rem; }

.mvp-votes {
  font-family: 'Fira Code', monospace;
  background: var(--accent);
  color: var(--text);
  padding: 3px 12px;
  border-radius: 20px;
  font-weight: 700;
  font-size: 0.8rem;
}

/* --- 試合履歴 --- */
.match-history-item { padding: 14px 0; border-bottom: 1px solid var(--border-light); }
.match-history-item:last-child { border-bottom: none; }

.match-date {
  font-family: 'Fira Code', monospace;
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.match-score-line { font-family: 'Fira Code', monospace; font-size: 0.95rem; font-weight: 600; }

.match-status {
  display: inline-block;
  font-family: 'Fira Code', monospace;
  font-size: 0.7rem;
  font-weight: 700;
  padding: 2px 10px;
  border-radius: 20px;
  margin-left: 10px;
  letter-spacing: 0.02em;
  text-transform: uppercase;
}

.status-ongoing { background: var(--success-bg); color: var(--success); border: 1px solid var(--success); }
.status-ended { background: var(--border-light); color: var(--text-muted); border: 1px solid var(--border); }

/* --- 成績 --- */
.stats-sort { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.stats-sort .input { width: auto; flex: 1; }

.stats-card {
  padding: 14px 16px;
  margin-bottom: 10px;
  background: var(--bg-surface);
  border-radius: var(--radius-sm);
  border-left: 5px solid var(--primary);
  transition: box-shadow var(--transition);
}

.stats-card:hover { box-shadow: var(--shadow-md); }
.stats-card:nth-child(1) { border-left-color: var(--accent); background: #FFFBEB; }
.stats-card:nth-child(2) { border-left-color: #94A3B8; background: #F8FAFC; }
.stats-card:nth-child(3) { border-left-color: #CD7F32; background: #FFF7ED; }

.stats-name {
  font-family: 'Fira Code', monospace;
  font-weight: 700;
  font-size: 1rem;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.stats-rank {
  font-family: 'Fira Code', monospace;
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-right: 4px;
  font-weight: 700;
}

.stats-details {
  display: flex;
  gap: 14px;
  font-size: 0.8rem;
  color: var(--text-secondary);
  flex-wrap: wrap;
}

.stats-details span { white-space: nowrap; display: flex; align-items: center; gap: 3px; }

.stats-details .stat-icon,
.stat-icon {
  width: 14px;
  height: 14px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  display: inline;
  vertical-align: middle;
}

/* --- セグメントボタン（ランキング切り替え） --- */
.segment-bar {
  display: flex;
  background: var(--border-light);
  border-radius: var(--radius-sm);
  padding: 3px;
  margin-bottom: 14px;
  gap: 3px;
}

.segment-btn {
  flex: 1;
  padding: 8px 6px;
  border: none;
  border-radius: 8px;
  background: transparent;
  font-family: 'Fira Sans', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
  transition: all var(--transition);
  text-align: center;
  line-height: 1.3;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}

.segment-btn:hover {
  color: var(--text-secondary);
  background: rgba(255, 255, 255, 0.5);
}

.segment-btn.active {
  background: var(--bg-card);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}

/* --- スタッツカード拡張（レーティング表示） --- */
.stats-rating {
  font-family: 'Fira Code', monospace;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--primary);
  background: var(--bg-surface);
  border: 2px solid var(--border);
  border-radius: var(--radius-xs);
  padding: 2px 8px;
  margin-left: auto;
  white-space: nowrap;
}

.stats-rating-high {
  color: var(--accent-dark);
  border-color: var(--accent);
  background: #FFFBEB;
}

.stats-rating-mid {
  color: var(--success);
  border-color: var(--success);
  background: var(--success-bg);
}

/* --- スタッツ強調表示 --- */
.stats-highlight {
  font-family: 'Fira Code', monospace;
  font-size: 1rem;
  font-weight: 700;
  color: var(--primary);
  margin-left: auto;
  white-space: nowrap;
}

/* --- アコーディオン展開（個人詳細） --- */
.stats-card-expandable {
  cursor: pointer;
}

.stats-expand-icon {
  width: 16px;
  height: 16px;
  stroke: var(--text-muted);
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: transform var(--transition);
  flex-shrink: 0;
}

.stats-card-expandable.expanded .stats-expand-icon {
  transform: rotate(180deg);
}

.stats-detail {
  max-height: 0;
  overflow: hidden;
}

@media (prefers-reduced-motion: no-preference) {
  .stats-detail {
    transition: max-height 300ms ease-out;
  }

  .stats-card-expandable.expanded .stats-detail {
    transition: max-height 300ms ease-in;
  }
}

.stats-card-expandable.expanded .stats-detail {
  max-height: 500px;
}

.stats-detail-inner {
  padding-top: 12px;
  margin-top: 10px;
  border-top: 1px solid var(--border-light);
}

.stats-match-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  font-size: 0.8rem;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border-light);
}

.stats-match-row:last-child {
  border-bottom: none;
}

.stats-match-label {
  font-family: 'Fira Code', monospace;
  font-size: 0.75rem;
  font-weight: 600;
  min-width: 60px;
}

.stats-match-result {
  font-family: 'Fira Code', monospace;
  font-size: 0.75rem;
  font-weight: 700;
  padding: 1px 8px;
  border-radius: 4px;
}

.stats-match-win { background: var(--success-bg); color: var(--success); }
.stats-match-lose { background: var(--border-light); color: var(--text-muted); }
.stats-match-draw { background: var(--team-d-bg); color: var(--team-d); }

.stats-ai-comment {
  margin-top: 10px;
  padding: 10px 12px;
  background: var(--bg-surface);
  border-radius: var(--radius-xs);
  font-size: 0.82rem;
  color: var(--text-secondary);
  line-height: 1.5;
  border-left: 3px solid var(--accent);
}

/* --- マッチタイマー --- */
.match-timer-inline {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-bottom: 4px;
}

.match-timer-step {
  width: 40px;
  height: 40px;
  min-width: 40px;
  min-height: 40px;
  padding: 0;
  font-family: 'Fira Code', monospace;
  font-size: 1.2rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
}

.match-timer-value {
  font-family: 'Fira Code', monospace;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--text);
  min-width: 32px;
  text-align: center;
}

.match-timer-unit {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-muted);
}

.match-timer-start {
  gap: 4px;
}

.match-timer-stop {
  gap: 4px;
}

.match-timer {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 10px;
  padding: 10px 16px;
  background: var(--bg-surface);
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  -webkit-transform: translateZ(0);
  transform: translateZ(0);
}

.match-timer-time {
  font-family: 'Fira Code', monospace;
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.05em;
}

.match-timer-warning {
  border-color: var(--accent);
  background: #FFFBEB;
}

.match-timer-warning .match-timer-time {
  color: var(--accent-dark);
}

.match-timer-ended {
  border-color: var(--primary);
  background: var(--bg-surface);
}

.match-timer-ended .match-timer-time {
  color: var(--primary);
}

.match-timer-paused .match-timer-time {
  opacity: 0.6;
}

/* --- ラウンド・マッチ折りたたみ --- */
.round-body-collapsed {
  display: none;
}

.match-body-collapsed {
  display: none;
}

.round-card-collapsed {
  cursor: pointer;
}

.round-expand-icon {
  width: 16px;
  height: 16px;
  stroke: var(--text-muted);
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: transform var(--transition);
  flex-shrink: 0;
}

.round-expand-icon-open {
  transform: rotate(180deg);
}

/* --- ローディング --- */
.loading {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(254, 242, 242, 0.85);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.loading-content {
  text-align: center;
}

.loading-content p {
  margin-top: 16px;
  font-weight: 600;
  color: var(--text);
}

.loading-content .loading-sub {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-top: 4px;
  font-weight: 400;
}

.spinner {
  width: 44px;
  height: 44px;
  border: 4px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* --- トースト --- */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--text);
  color: white;
  padding: 12px 24px;
  border-radius: var(--radius-sm);
  font-family: 'Fira Sans', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  opacity: 0;
  transition: all 300ms ease;
  z-index: 1001;
  max-width: 90%;
  text-align: center;
  box-shadow: var(--shadow-lg);
}

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { background: var(--danger); }

/* --- 空状態（改善版） --- */
.empty-state {
  text-align: center;
  padding: 32px 16px;
  color: var(--text-muted);
  font-size: 0.9rem;
}

.empty-state svg {
  display: block;
  margin: 0 auto 12px;
}

.empty-state .empty-sub {
  font-size: 0.8rem;
  margin-top: 4px;
  color: var(--text-muted);
}

/* --- アニメーション --- */
@media (prefers-reduced-motion: no-preference) {
  .card {
    animation: fadeUp 300ms ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
}

/* --- スコアバウンスアニメーション --- */
@media (prefers-reduced-motion: no-preference) {
  .score.updated {
    animation: scoreBounce 300ms ease;
  }

  @keyframes scoreBounce {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); color: var(--primary); }
    100% { transform: scale(1); }
  }
}

/* --- レスポンシブ --- */
@media (max-width: 374px) {
  .checkbox-grid { grid-template-columns: 1fr; }
  .teams-preview { grid-template-columns: 1fr; }
  .scoreboard { gap: 8px; padding: 16px 8px; }
  .score { font-size: 2.5rem; }
}

/* --- 入力行（横並び） --- */
.input-row { display: flex; gap: 8px; }
.input-row .input-group { margin-bottom: 10px; }

/* --- チェックボックスラベル --- */
.checkbox-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
}

.checkbox-label input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: var(--primary);
  cursor: pointer;
}

/* --- 分割ボタン --- */
.split-buttons { display: flex; gap: 8px; margin-bottom: 12px; }

/* --- ドラッグ&ドロップ チーム分けボード --- */
.split-board-actions {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.split-pool {
  background: var(--bg-surface);
  border: 2px dashed var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  margin-bottom: 12px;
  min-height: 60px;
}

.split-pool-label {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 8px;
}

.split-pool-members {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  min-height: 36px;
}

.split-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 6px 12px;
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text);
  cursor: grab;
  touch-action: none;
  user-select: none;
  transition: box-shadow var(--transition), border-color var(--transition);
}

.split-chip:active {
  cursor: grabbing;
}

.split-chip.dragging {
  opacity: 0.5;
  box-shadow: var(--shadow-md);
}

.split-chip .chip-exp {
  font-size: 0.65rem;
  color: var(--success);
  font-weight: 700;
}

.split-drop-zone {
  border-radius: var(--radius-sm);
  padding: 10px;
  margin-bottom: 8px;
  min-height: 60px;
  transition: box-shadow var(--transition);
}

.split-drop-zone.drag-over {
  box-shadow: inset 0 0 0 3px rgba(220, 38, 38, 0.3);
}

.split-drop-zone .split-pool-label {
  font-family: 'Fira Code', monospace;
  font-size: 0.8rem;
  font-weight: 700;
  margin-bottom: 8px;
  text-align: center;
}

.split-drop-zone .split-pool-members {
  justify-content: center;
}

.split-drop-zone .split-chip {
  border-color: transparent;
}

.split-drop-zone.team-a-zone { background: var(--team-a-bg); border: 2px solid var(--team-a-border); }
.split-drop-zone.team-b-zone { background: var(--team-b-bg); border: 2px solid var(--team-b-border); }
.split-drop-zone.team-c-zone { background: var(--team-c-bg); border: 2px solid var(--team-c-border); }
.split-drop-zone.team-d-zone { background: var(--team-d-bg); border: 2px solid var(--team-d-border); }
.split-drop-zone.team-e-zone { background: var(--team-e-bg); border: 2px solid var(--team-e-border); }

.split-drop-zone.team-a-zone .split-chip { background: white; border-color: var(--team-a-border); }
.split-drop-zone.team-b-zone .split-chip { background: white; border-color: var(--team-b-border); }
.split-drop-zone.team-c-zone .split-chip { background: white; border-color: var(--team-c-border); }
.split-drop-zone.team-d-zone .split-chip { background: white; border-color: var(--team-d-border); }
.split-drop-zone.team-e-zone .split-chip { background: white; border-color: var(--team-e-border); }

.split-team-count {
  font-family: 'Fira Code', monospace;
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--text-muted);
  float: right;
}

/* --- ラウンドカード --- */
.round-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border-light);
}

.round-card .round-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.round-card .round-title {
  font-family: 'Fira Code', monospace;
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--text);
}

/* --- イベントリストアイテム --- */
.event-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid var(--border-light);
  cursor: pointer;
  transition: background var(--transition);
}

.event-item:last-child { border-bottom: none; }

.event-item:hover {
  background: var(--bg-surface);
  margin: 0 -16px;
  padding: 14px 16px;
  border-radius: var(--radius-sm);
}

.event-info { flex: 1; }
.event-name { font-weight: 600; font-size: 0.95rem; margin-bottom: 2px; }
.event-date { font-family: 'Fira Code', monospace; font-size: 0.8rem; color: var(--text-muted); }

.event-status-badge {
  font-family: 'Fira Code', monospace;
  font-size: 0.7rem;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.02em;
}

.badge-preparing { background: var(--team-a-bg); color: var(--team-a); border: 1px solid var(--team-a-border); }
.badge-ongoing { background: var(--success-bg); color: var(--success); border: 1px solid var(--success); }
.badge-ended { background: var(--team-d-bg); color: var(--team-d); border: 1px solid var(--team-d-border); }
.badge-done { background: var(--border-light); color: var(--text-muted); border: 1px solid var(--border); }

/* --- MVP結果カード --- */
.mvp-result-card {
  padding: 16px;
  margin-bottom: 10px;
  border-radius: var(--radius-sm);
  border-left: 5px solid var(--primary);
  background: var(--bg-surface);
}

.mvp-result-card.rank-mvp { border-left-color: var(--accent); background: #FFFBEB; }
.mvp-result-card.rank-sub { border-left-color: #94A3B8; background: #F8FAFC; }

.mvp-result-name { font-family: 'Fira Code', monospace; font-weight: 700; font-size: 1rem; margin-bottom: 4px; }

.mvp-result-rank {
  font-family: 'Fira Code', monospace;
  font-size: 0.75rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 12px;
  margin-left: 8px;
}

.mvp-result-reason { font-size: 0.85rem; color: var(--text-secondary); margin-top: 4px; }
.mvp-result-scores { display: flex; gap: 12px; font-size: 0.8rem; color: var(--text-muted); margin-top: 6px; }

/* --- アンケートリンク --- */
.survey-link {
  display: block;
  padding: 12px;
  background: var(--team-a-bg);
  border: 2px solid var(--team-a-border);
  border-radius: var(--radius-sm);
  text-align: center;
  color: var(--team-a);
  font-weight: 600;
  text-decoration: none;
  margin: 10px 0;
  transition: all var(--transition);
  word-break: break-all;
}

.survey-link:hover { background: var(--team-a); color: white; }

/* --- メンバー属性バッジ --- */
.member-badges { display: flex; gap: 4px; margin-top: 2px; }

.badge {
  font-family: 'Fira Code', monospace;
  font-size: 0.65rem;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 4px;
  letter-spacing: 0.02em;
}

.badge-exp { background: var(--success-bg); color: var(--success); }
.badge-noexp { background: var(--border-light); color: var(--text-muted); }
.badge-organizer { background: #FFFBEB; color: var(--accent-dark); }
.badge-years { background: var(--bg-surface); color: var(--text-secondary); }

/* --- タブバー --- */
.tab-bar {
  display: flex;
  background: var(--bg-card);
  border-radius: var(--radius);
  margin-bottom: 12px;
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  border: 1px solid var(--border-light);
}

.tab-btn {
  flex: 1;
  padding: 12px 8px;
  border: none;
  background: none;
  font-family: 'Fira Sans', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-muted);
  cursor: pointer;
  transition: all var(--transition);
  border-bottom: 3px solid transparent;
}

.tab-btn:hover { color: var(--primary); background: var(--bg-surface); }

.tab-btn.active {
  color: var(--primary);
  background: var(--bg-surface);
  border-bottom-color: var(--primary);
}

.tab-content { display: none; }
.tab-content.active { display: block; }

/* --- フォーカス（キーボードナビゲーション） --- */
.btn:focus-visible,
.input:focus-visible,
.checkbox-item input:focus-visible,
.mvp-candidate:focus-visible {
  outline: 3px solid var(--primary);
  outline-offset: 2px;
}

/* --- ログイン画面 --- */
.login-hero { text-align: center; padding: 48px 20px 24px; }

.login-hero-icon {
  width: 96px;
  height: 96px;
  margin: 0 auto 16px;
  background: linear-gradient(135deg, rgba(220, 38, 38, 0.08) 0%, rgba(251, 191, 36, 0.12) 100%);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 8px 32px rgba(251, 191, 36, 0.2), 0 4px 16px rgba(220, 38, 38, 0.1);
}

.login-hero-icon .login-logo {
  width: 80px;
  height: 80px;
}

.login-hero-icon svg {
  stroke: white;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.login-hero-title {
  font-family: 'Luckiest Guy', 'Fira Code', monospace;
  font-size: 2rem;
  font-weight: 400;
  color: var(--text);
  margin-bottom: 6px;
  justify-content: center;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  display: flex;
  align-items: center;
  gap: 4px;
}

.login-mic {
  width: 28px;
  height: 38px;
  flex-shrink: 0;
}

.login-hero-sub { font-size: 0.85rem; color: var(--text-muted); }

.login-card { max-width: 400px; margin: 0 auto; }
.login-code-input-wrap { margin-bottom: 16px; }

.login-code-input {
  width: 100%;
  padding: 16px 20px;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  font-family: 'Fira Code', monospace;
  font-size: 1.4rem;
  font-weight: 600;
  color: var(--text);
  background: var(--bg-card);
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  transition: border-color var(--transition), box-shadow var(--transition);
}

.login-code-input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.12);
}

.login-code-input::placeholder {
  font-size: 1rem;
  font-weight: 400;
  letter-spacing: 0.02em;
  color: var(--text-muted);
  text-transform: none;
}

.login-admin-area { max-width: 400px; margin: 32px auto 0; text-align: center; }
.login-section { margin-bottom: 8px; }
.login-section h3 { margin-bottom: 4px; }
.login-desc { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 12px; }

.admin-toggle-link {
  display: block;
  text-align: center;
  font-size: 0.8rem;
  color: var(--text-muted);
  text-decoration: none;
  cursor: pointer;
}

.admin-toggle-link:hover { color: var(--text-secondary); text-decoration: underline; }

/* --- ロール別表示制御 --- */
body.role-user .admin-only { display: none !important; }
body.role-admin .user-only { display: none !important; }
body:not(.role-user):not(.role-admin) .admin-only,
body:not(.role-user):not(.role-admin) .user-only { display: none !important; }

/* --- イベントコード表示 --- */
.event-code {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'Fira Code', monospace;
  font-size: 0.85rem;
  font-weight: 600;
  padding: 6px 12px;
  background: var(--bg-surface);
  border: 2px solid var(--border);
  border-radius: var(--radius-xs);
  color: var(--text-secondary);
}

.event-code-value {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--primary);
  letter-spacing: 0.1em;
}

/* --- ステップインジケーター --- */
.step-indicator {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-light);
}

.step-indicator .step {
  flex: 1;
  text-align: center;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-muted);
  padding: 6px 4px;
  border-radius: var(--radius-xs);
  background: var(--bg-surface);
  transition: all var(--transition);
}

.step-indicator .step.active { background: var(--primary); color: white; }
.step-indicator .step.done { background: var(--success-bg); color: var(--success); }

/* --- カスタムモーダル --- */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(127, 29, 29, 0.4);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
  padding: 20px;
}

.modal-box {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 24px;
  max-width: 360px;
  width: 100%;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border-light);
}

.modal-box h3 {
  font-family: 'Fira Code', monospace;
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 12px;
  color: var(--text);
}

.modal-box p {
  font-size: 0.9rem;
  color: var(--text-secondary);
  margin-bottom: 20px;
  line-height: 1.6;
}

.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* --- ユーティリティクラス --- */
.mt-sm { margin-top: 8px; }
.mt-md { margin-top: 12px; }
.mt-lg { margin-top: 16px; }
.mb-sm { margin-bottom: 8px; }
.mb-md { margin-bottom: 12px; }
.hidden { display: none; }

/* --- メンバー登録フォーム --- */
.member-form-name {
  margin-bottom: 14px;
}

.input-name {
  font-size: 1.1rem;
  font-weight: 500;
  padding: 14px 16px;
  border-radius: var(--radius);
}

.member-form-attrs {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 14px;
}

.attr-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.attr-label {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.attr-input {
  padding: 8px 10px;
  font-size: 0.9rem;
  text-align: center;
}

.attr-label-cb {
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
