<script>
// ===================================
// イベント一覧・詳細管理
// ===================================

// ===================================
// イベント一覧
// ===================================

/** イベント一覧を読み込む */
function loadEventList() {
  callServer('getEvents', [], function(events) {
    renderEventList(events);
  }, '読み込みエラー');
}

/**
 * イベント一覧を描画する
 * @param {Object[]} events - イベント配列
 */
function renderEventList(events) {
  var c = document.getElementById('event-list');
  if (!events || events.length === 0) {
    c.innerHTML = '<div class="empty-state">まだイベントがありません。最初の一歩を踏み出そう！</div>';
    return;
  }
  c.innerHTML = events.map(function(ev) {
    return eventItemHtml(ev, "openEvent('" + ev['イベントID'] + "')");
  }).join('');
}

/** 新規イベントを作成する */
function createNewEvent() {
  var name = document.getElementById('ev-name').value.trim() || 'フットサル';
  var date = document.getElementById('ev-date').value || new Date().toLocaleDateString('ja-JP');
  var code = document.getElementById('ev-code').value.trim();
  if (!code) { showToast('参加コードを入力してください', true); return; }
  callServer('createNewEvent', [date, name, code], function(r) {
    if (r.success) {
      showToast(r.message);
      openEvent(r.eventId);
    } else {
      showToast(r.message, true);
    }
  });
}

// ===================================
// イベント詳細
// ===================================

/**
 * イベント詳細を開く
 * @param {string} eventId - イベントID
 * @param {string} [activeTab] - 初期表示タブ
 * @param {boolean} [skipHash] - URL更新をスキップするか
 */
function openEvent(eventId, activeTab, skipHash) {
  currentEventId = eventId;
  callServer('getEventDetail', [eventId], function(d) {
    if (!d) { showToast('イベントが見つかりません', true); return; }
    currentMembers = d.members;
    cachedRounds = d.rounds;
    cachedMvpData = d.mvpResults || [];
    previewTeams = [];
    previewNames = [];
    renderEventDetail(d, activeTab);
    if (!skipHash) pushState_();
  }, 'エラー');
}

/**
 * イベント詳細を描画する
 * @param {Object} d - イベント詳細データ
 * @param {string} [activeTab] - 初期表示タブ
 */
function renderEventDetail(d, activeTab) {
  document.getElementById('event-list-view').style.display = 'none';
  document.getElementById('event-detail-view').style.display = 'block';

  var ev = d.event;
  currentEventStatus = ev['ステータス'] || '準備中';

  // タイトル（管理者の場合は日付の横に参加コードを小さく表示）
  var titleH = '<svg class="section-icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>' +
    '<line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> ' +
    esc(ev['名称'] || '') + ' <span class="event-date" style="margin-left:8px;">' + esc(String(ev['日付'] || '')) + '</span>';
  if (isAdmin() && ev['コード']) {
    titleH += '<span class="event-code-inline">' + esc(ev['コード']) + '</span>';
  }
  document.getElementById('ev-detail-title').innerHTML = titleH;

  // ステータスと遷移ボタン（管理者のみ）
  var statusH = statusBadgeHtml(ev['ステータス']);
  if (isAdmin()) {
    statusH += buildStatusButtons_(ev['ステータス']);
  }
  document.getElementById('ev-detail-status').innerHTML = statusH;

  // 各セクションを描画
  renderMemberList(d.members);
  renderParticipantCB(d.members);
  renderRoundsList(d.rounds);
  renderPostMatch(ev, d.rounds, d.mvpResults);

  // チーム分けボードリセット
  document.getElementById('split-step1').style.display = 'block';
  document.getElementById('split-step2').style.display = 'none';
  document.getElementById('split-board').innerHTML = '';
  document.getElementById('btn-create-round').style.display = 'none';
  boardState = { pool: [], teams: [] };
  boardNames = [];

  // ラウンド作成セクションの表示制御
  // 進行中ラウンドがある、または試合終了/完了の場合は非表示
  var hasOngoing = (d.rounds || []).some(function(r) { return r.status !== '終了'; });
  var canCreateRound = currentEventStatus === '進行中' && !hasOngoing;
  document.getElementById('round-create-section').style.display = canCreateRound ? '' : 'none';

  updateTeamCountOptions();
  switchTab(activeTab || 'tab-members');
}

/** イベント一覧に戻る */
function backToEventList() {
  document.getElementById('event-detail-view').style.display = 'none';
  document.getElementById('event-list-view').style.display = 'block';
  currentEventId = null;
  loadEventList();
  pushState_();
}

// ===================================
// ステータス遷移
// ===================================

/**
 * ステータスに応じた三点メニューのHTMLを生成する
 * @param {string} status - 現在のステータス
 * @return {string} メニューHTML
 */
function buildStatusButtons_(status) {
  var items = getStatusMenuItems_(status);
  if (items.length === 0) return '';

  var menuH = '<div class="status-menu-wrap">' +
    '<button class="status-menu-btn" onclick="toggleStatusMenu(event)" aria-label="ステータス操作">' +
    svg(IC.more, 16) + '</button>' +
    '<div class="status-menu" id="status-menu">';
  items.forEach(function(item) {
    var disabledClass = item.disabled ? ' status-menu-item-disabled' : '';
    var disabledAttr = item.disabled ? ' aria-disabled="true"' : '';
    var tooltip = item.tooltip ? ' title="' + esc(item.tooltip) + '"' : '';
    menuH += '<button class="status-menu-item' + disabledClass + '" onclick="' + item.action + '"' + disabledAttr + tooltip + '>' +
      item.label + '</button>';
  });
  menuH += '</div></div>';
  return menuH;
}

/**
 * ステータスに応じたメニュー項目を取得する
 * @param {string} status - 現在のステータス
 * @return {Object[]} メニュー項目配列
 */
function getStatusMenuItems_(status) {
  if (status === '準備中') {
    return [];
  }
  if (status === '進行中') {
    var canEnd = canEndEvent_();
    return [{
      label: 'イベント終了',
      action: 'doEndEvent()',
      disabled: !canEnd,
      tooltip: canEnd ? '' : '全てのラウンドと試合を終了してください'
    }];
  }
  if (status === '試合終了') {
    return [
      { label: '完了にする', action: 'doCompleteEvent()' },
      { label: '進行中に戻す', action: 'doReopenEvent()' }
    ];
  }
  if (status === '完了') {
    return [
      { label: '試合終了に戻す', action: 'doUncompleteEvent()' }
    ];
  }
  return [];
}

/** 三点メニューの開閉 */
function toggleStatusMenu(e) {
  e.stopPropagation();
  var menu = document.getElementById('status-menu');
  if (menu) {
    menu.classList.toggle('open');
  }
}

/** メニュー外クリックで閉じる */
document.addEventListener('click', function() {
  var menu = document.getElementById('status-menu');
  if (menu) menu.classList.remove('open');
});

/**
 * イベントを終了できるかチェックする
 * 全ラウンドが終了かつ全マッチが終了している必要がある
 * @return {boolean}
 */
function canEndEvent_() {
  if (!cachedRounds || cachedRounds.length === 0) return false;
  var hasOngoingRound = cachedRounds.some(function(r) { return r.status !== '終了'; });
  if (hasOngoingRound) return false;
  var hasOngoingMatch = cachedRounds.some(function(r) {
    return r.matches && r.matches.some(function(m) { return m.status !== '終了'; });
  });
  return !hasOngoingMatch;
}

/** イベントを「試合終了」にする */
function doEndEvent() {
  showConfirm('イベント終了', 'イベントを終了しますか？MVP選出が可能になります。', function() {
    callServer('endEvent', [currentEventId], function(r) {
      showToast(r.message, !r.success);
      if (r.success) openEvent(currentEventId);
    });
  }, '終了する');
}

/** イベントを「進行中」に戻す */
function doReopenEvent() {
  showConfirm('差戻確認', 'イベントを進行中に戻しますか？ラウンドや試合を追加できるようになります。', function() {
    callServer('reopenEvent', [currentEventId], function(r) {
      showToast(r.message, !r.success);
      if (r.success) openEvent(currentEventId);
    });
  }, '差戻');
}

/** イベントを「完了」にする */
function doCompleteEvent() {
  showConfirm('イベント完了', 'イベントを完了にしますか？完了後は全ての変更ができなくなります。', function() {
    callServer('completeEvent', [currentEventId], function(r) {
      showToast(r.message, !r.success);
      if (r.success) openEvent(currentEventId);
    });
  }, '完了にする');
}

/** イベントを「試合終了」に戻す（完了から差し戻し） */
function doUncompleteEvent() {
  showConfirm('差戻確認', 'イベントを試合終了に戻しますか？MVP再選出やアンケート回答が可能になります。', function() {
    callServer('uncompleteEvent', [currentEventId], function(r) {
      showToast(r.message, !r.success);
      if (r.success) openEvent(currentEventId);
    });
  }, '差戻');
}
</script>
