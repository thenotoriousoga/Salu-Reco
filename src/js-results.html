<script>
// ===================================
// イベント内成績（フロントで計算）
// ===================================
var currentStatsMode = 'goals';
var cachedStatsData = [];
var cachedMvpData = [];

function switchStatsMode(mode) {
  currentStatsMode = mode;
  document.querySelectorAll('#stats-segment .segment-btn').forEach(function(b) {
    b.classList.toggle('active', b.getAttribute('data-mode') === mode);
  });
  renderStatsCards();
}

function toggleStatsDetail(el) {
  el.classList.toggle('expanded');
}

/** MVP結果データからレーティング・評価コメント・称号を取得 */
function getMvpDataForMember_(memberId) {
  var item = cachedMvpData.find(function(r) { return r['メンバーID'] === memberId; });
  if (!item) return null;
  return {
    rating: Number(item['レーティング']) || 0,
    comment: item['評価コメント'] || '',
    title: item['称号'] || ''
  };
}

function ratingClass_(rating) {
  if (rating >= 8.0) return ' stats-rating-high';
  if (rating >= 6.0) return ' stats-rating-mid';
  return '';
}

/**
 * モード別の強調表示HTMLを生成する
 * @param {Object} s - スタッツデータ
 * @return {string} HTML文字列
 */
function statsHighlightHtml_(s) {
  if (currentStatsMode === 'goals') return '<span class="stats-highlight">' + s.goals + '点</span>';
  if (currentStatsMode === 'points') return '<span class="stats-highlight">' + s.matchPoints + 'pt</span>';
  return '<span class="stats-rating' + ratingClass_(s.rating) + '">' + s.rating.toFixed(1) + '</span>';
}

/**
 * 詳細行HTMLを生成する（全モード共通）
 * @param {Object} s - スタッツデータ
 * @return {string} HTML文字列
 */
function statsDetailsHtml_(s) {
  return '<span>' + s.wins + '勝</span>' +
    '<span>' + s.losses + '敗</span>' +
    '<span>' + s.draws + '分</span>' +
    '<span>' + s.played + '試合</span>' +
    '<span>' + s.goals + '得点</span>';
}

function renderEventStats() {
  var c = document.getElementById('event-stats');
  var segBar = document.getElementById('stats-segment');
  var members = currentMembers;

  // 準備中の場合はガイドメッセージを表示
  if (currentEventStatus === '準備中') {
    segBar.style.display = 'none';
    var msg = isAdmin()
      ? '準備ができたら、ステータスを「進行中」に変更してください'
      : 'イベントが開始されるまでお待ちください';
    c.innerHTML = '<div class="empty-state">' +
      '<svg aria-hidden="true" style="width:48px;height:48px;stroke:var(--border);fill:none;stroke-width:1.5;" viewBox="0 0 24 24">' +
      '<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>' +
      '<p>' + esc(msg) + '</p></div>';
    return;
  }

  if (!members || members.length === 0) {
    segBar.style.display = 'none';
    c.innerHTML = '<div class="empty-state">' +
      '<svg aria-hidden="true" style="width:48px;height:48px;stroke:var(--border);fill:none;stroke-width:1.5;" viewBox="0 0 24 24">' +
      '<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>' +
      '<p>メンバーを登録してください</p></div>';
    return;
  }

  // 全マッチをフラットに収集
  var allMatches = [];
  if (cachedRounds) {
    cachedRounds.forEach(function(r) {
      if (r.matches) r.matches.forEach(function(m) {
        allMatches.push({ match: m, roundNumber: r.roundNumber });
      });
    });
  }

  // スタッツタブ表示判定
  var isFinished = currentEventStatus === '試合終了' || currentEventStatus === '完了';
  var hasMvp = isFinished && cachedMvpData && cachedMvpData.length > 0 && cachedMvpData.some(function(r) { return Number(r['レーティング']) > 0; });

  segBar.style.display = 'flex';
  var statsBtn = segBar.querySelector('[data-mode="stats"]');
  if (hasMvp && !statsBtn) {
    var btn = document.createElement('button');
    btn.className = 'segment-btn';
    btn.setAttribute('data-mode', 'stats');
    btn.setAttribute('onclick', "switchStatsMode('stats')");
    btn.textContent = '📊 スタッツ';
    segBar.appendChild(btn);
  } else if (!hasMvp && statsBtn) {
    statsBtn.remove();
    if (currentStatsMode === 'stats') {
      currentStatsMode = 'goals';
      segBar.querySelector('[data-mode="goals"]').classList.add('active');
    }
  }

  // 成績データを計算
  cachedStatsData = members.map(function(m) {
    var mId = m['メンバーID'];
    var wins = 0, losses = 0, draws = 0, played = 0, totalGoals = 0;
    var matchDetails = [];

    allMatches.forEach(function(item) {
      var match = item.match;
      var inA = match.teamA.find(function(p) { return p.id === mId; });
      var inB = match.teamB.find(function(p) { return p.id === mId; });
      if (!inA && !inB) return;
      played++;
      var result = '進行中';
      var goalCount = 0;

      if (match.status === '終了') {
        var sA = Number(match.scoreA), sB = Number(match.scoreB);
        if (sA === sB) { draws++; result = '引分'; }
        else if ((inA && sA > sB) || (inB && sB > sA)) { wins++; result = '勝ち'; }
        else { losses++; result = '負け'; }
      }

      if (match.memberGoals) {
        var g = match.memberGoals.find(function(g) { return g.memberId === mId; });
        if (g) { goalCount = Number(g.count); totalGoals += goalCount; }
      } else if (match.goals) {
        goalCount = match.goals.filter(function(g) { return g.memberId === mId && g.type === '通常'; }).length;
        totalGoals += goalCount;
      }

      matchDetails.push({
        roundNumber: item.roundNumber,
        matchNumber: match.matchNumber,
        result: result,
        goals: goalCount,
        scoreA: match.scoreA,
        scoreB: match.scoreB,
        teamAName: match.teamAName || 'チームA',
        teamBName: match.teamBName || 'チームB',
        myTeam: inA ? 'A' : 'B'
      });
    });

    var mvpInfo = getMvpDataForMember_(mId);
    return {
      id: mId,
      name: m['名前'],
      experience: m['サッカー経験'],
      played: played,
      wins: wins,
      losses: losses,
      draws: draws,
      goals: totalGoals,
      matchPoints: wins * 3 + draws,
      matchDetails: matchDetails,
      rating: mvpInfo ? mvpInfo.rating : 0,
      comment: mvpInfo ? mvpInfo.comment : '',
      title: mvpInfo ? mvpInfo.title : ''
    };
  });

  renderStatsCards();
}

function renderStatsCards() {
  var c = document.getElementById('event-stats');
  var stats = cachedStatsData.filter(function(s) { return s.played > 0; });

  // ソート
  if (currentStatsMode === 'goals') {
    stats.sort(function(a, b) { return b.goals - a.goals || b.wins - a.wins; });
  } else if (currentStatsMode === 'points') {
    stats.sort(function(a, b) { return b.matchPoints - a.matchPoints || b.goals - a.goals; });
  } else {
    stats.sort(function(a, b) { return b.rating - a.rating || b.goals - a.goals; });
  }

  c.innerHTML = stats.map(function(s, i) {
    var expB = s.experience === 'あり' ? '<span class="badge badge-exp">経験あり</span>' : '<span class="badge badge-noexp">未経験</span>';

    // 試合別詳細
    var matchRowsHtml = s.matchDetails.map(function(md) {
      var resultClass = md.result === '勝ち' ? 'stats-match-win' : (md.result === '負け' ? 'stats-match-lose' : (md.result === '引分' ? 'stats-match-draw' : ''));
      var resultBadge = resultClass ? '<span class="stats-match-result ' + resultClass + '">' + md.result + '</span>' : '<span class="stats-match-result">' + md.result + '</span>';
      return '<div class="stats-match-row">' +
        '<span class="stats-match-label">R' + md.roundNumber + '-M' + md.matchNumber + '</span>' +
        resultBadge +
        '<span>' + svg(IC.goal, 12) + ' ' + md.goals + '得点</span>' +
        '<span style="margin-left:auto;font-family:\'Fira Code\',monospace;font-size:0.75rem;">' + md.scoreA + '-' + md.scoreB + '</span>' +
        '</div>';
    }).join('');

    // AI評価コメント
    var aiCommentHtml = '';
    if (s.title || s.comment) {
      aiCommentHtml = '<div class="stats-ai-section">' +
        (s.title ? '<div class="stats-ai-title">🏅 ' + esc(s.title) + '</div>' : '') +
        (s.comment ? '<div class="stats-ai-comment-text">' + esc(s.comment) + '</div>' : '') +
        '</div>';
    }

    return '<div class="stats-card stats-card-expandable" onclick="toggleStatsDetail(this)">' +
      '<div class="stats-name">' +
      '<span class="stats-rank">#' + (i + 1) + '</span>' + esc(s.name) + ' ' + expB +
      statsHighlightHtml_(s) +
      '<svg class="stats-expand-icon" viewBox="0 0 24 24" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>' +
      '</div>' +
      '<div class="stats-details">' + statsDetailsHtml_(s) + '</div>' +
      '<div class="stats-detail"><div class="stats-detail-inner">' + matchRowsHtml + aiCommentHtml + '</div></div>' +
      '</div>';
  }).join('');
}

// ===================================
// MVP選出
// ===================================

function renderPostMatch(event, rounds, mvpResults) {
  var c = document.getElementById('post-match-content');
  var status = event['ステータス'] || '準備中';
  var hasMvpResults = mvpResults && mvpResults.length > 0;
  var canSelectMvp = isAdmin() && status === '試合終了';

  var trophySvg = '<svg aria-hidden="true" style="width:48px;height:48px;stroke:var(--border);fill:none;stroke-width:1.5;" viewBox="0 0 24 24">' +
    '<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5C7 4 9 7 12 7s5-3 7.5-3a2.5 2.5 0 0 1 0 5H18"/>' +
    '<path d="M18 9v10a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V9"/><path d="M12 7v14"/></svg>';

  if (!hasMvpResults && !canSelectMvp) {
    var msg;
    if (status === '完了') msg = 'イベントは終了しました';
    else if (!isAdmin() && status === '試合終了') msg = 'お疲れさまでした！アンケートに回答して、MVP発表を待とう！';
    else msg = '全試合終了後にMVP発表ができます。まずはピッチで暴れよう！';
    c.innerHTML = '<div class="empty-state">' + trophySvg + '<p>' + msg + '</p></div>';
    return;
  }

  var h = '';
  if (canSelectMvp) {
    h += '<div style="margin-bottom:14px;">' +
      '<div class="input-group"><label for="mvp-count">MVP人数</label><input type="number" id="mvp-count" value="1" min="1" max="5" class="input" style="width:80px;"></div>' +
      '<div class="input-group"><label for="sub-mvp-count">準MVP人数</label><input type="number" id="sub-mvp-count" value="1" min="0" max="5" class="input" style="width:80px;"></div>' +
      '<button class="btn btn-primary btn-large" onclick="runMvp()">' + svg(IC.trophy, 18) + ' MVPを発表</button></div>';
  }
  h += '<div id="mvp-results-area"></div>';
  c.innerHTML = h;
  if (hasMvpResults) renderMvpResults(mvpResults);
}

var mvpLoadingTimer_ = null;

function runMvp() {
  var mc = document.getElementById('mvp-count').value;
  var sc = document.getElementById('sub-mvp-count').value;
  showConfirm('MVP選出', 'いよいよMVP発表！準備はいいですか？', function() {
    showLoading("ウェカピポ -SOUL'd OUT", "Yo! 俺がDiggy-MO'だぜ! 聴いてくれ");
    var lines = [
      'Nah ウェカピポ Yo!',
      '秘めた巨大なPower そびえたったTower',
      'アスファルトに網目状にひびが入るような地響き',
      'Metropolis apocalypse, oh! 大げさな目次六とともに研ぎ澄ます',
      '鳥肌立つ だけど自らTuffに赴いてUrbanite',
      'わかってんじゃない? Ah!時は告げる 移ろう時代 世代に喝!',
      '見上げた空からのThunda a-yo! Wake up!',
      'その瞳も曇ってしまったLost generation',
      '失ってしまった愛という名のIllumination',
      '仮に別の愛という名のTemptation',
      'インチキな街 Just imitation でしょ?',
      'この場所に潤いをもう一度',
      'パンチを! 変わらないSituation',
      'そして胸の奥に秘めたSweetest emotion',
      'One time! Yo! Yo!',
      '荒 荒 荒波立つ ここはUrbanite ウェカピポ!',
      '若 若さの中 不確かな迷いとか ウェカピポ! O-oh!',
      '逆 逆 逆さまWorldの 孤独に強く ウェカピポ!',
      'まだ まだ 闘わねば 真実はどこだ',
      'Ah, ah, ah, ah-ah-ah, ah',
      'ｱ ｱﾗﾗﾗｧ ｱ ｱｧ'
    ];
    var lineIdx = 0;
    mvpLoadingTimer_ = setInterval(function() {
      if (lineIdx >= lines.length) { clearInterval(mvpLoadingTimer_); mvpLoadingTimer_ = null; return; }
      var el = document.getElementById('loading');
      var content = el.querySelector('.loading-content');
      var sub = content.querySelector('.loading-sub');
      if (!sub) { sub = document.createElement('p'); sub.className = 'loading-sub'; content.appendChild(sub); }
      sub.textContent = lines[lineIdx];
      lineIdx++;
    }, 2800);

    var clearMvpTimer = function() {
      if (mvpLoadingTimer_) { clearInterval(mvpLoadingTimer_); mvpLoadingTimer_ = null; }
    };

    google.script.run
      .withSuccessHandler(function(r) {
        clearMvpTimer();
        hideLoading();
        if (r.success) {
          showToast(r.message);
          cachedMvpData = (r.results || []).map(function(item) {
            return {
              'メンバーID': item.memberId,
              '称号': item.title || '',
              'レーティング': item.rating || 0,
              '評価コメント': item.comment || ''
            };
          });
          renderMvpResults(r.results);
          renderEventStats();
        } else { showToast(r.message, true); }
      })
      .withFailureHandler(function() {
        clearMvpTimer();
        hideLoading();
        showToast('MVP選出に失敗しました', true);
      })
      .selectMVP(currentEventId, mc, sc);
  }, '発表する');
}

function renderMvpResults(results) {
  var c = document.getElementById('mvp-results-area');
  if (!results || results.length === 0) { c.innerHTML = ''; return; }
  var h = '<h3 style="margin-top:16px;margin-bottom:10px;">' + svg(IC.trophy, 18) + ' MVP選出結果</h3>';
  h += results.map(function(r) {
    var rank = r['順位'] || r.rank || '';
    var name = r['名前'] || r.name || '';
    var title = r['称号'] || r.title || '';
    var reason = r['理由'] || r.reason || '';
    var ts = r['総合スコア'] || r.totalScore || 0;
    if (!rank) return '';
    var cc = rank === 'MVP' ? 'rank-mvp' : 'rank-sub';
    var rb = rank === 'MVP'
      ? '<span class="mvp-result-rank" style="background:var(--accent);color:var(--text);">MVP</span>'
      : '<span class="mvp-result-rank" style="background:#94A3B8;color:white;">準MVP</span>';
    var titleHtml = title ? '<div class="mvp-result-title">🏅 ' + esc(title) + '</div>' : '';
    return '<div class="mvp-result-card ' + cc + '"><div class="mvp-result-name">' + esc(name) + rb + '</div>' +
      titleHtml +
      '<div class="mvp-result-reason">' + esc(reason) + '</div>' +
      '<div class="mvp-result-scores"><span>総合: ' + ts + 'pt</span></div></div>';
  }).join('');
  c.innerHTML = h;
}
</script>
