<script>
// ===================================
// メンバー管理
// ===================================
var memberQueue = [];

/** 備考フィールドの表示/非表示を切り替える */
function toggleNoteField() {
  var field = document.getElementById('note-field');
  if (field.style.display === 'none') {
    field.style.display = 'block';
    document.getElementById('m-note').focus();
  } else {
    field.style.display = 'none';
  }
}

/** アイコン凡例のHTML */
function memberLegendHtml_() {
  return '<div class="member-legend">' +
    '<span>⚽経験あり</span>' +
    '<span>👔幹事</span>' +
    '<span class="legend-survey">✓回答済</span>' +
    '</div>';
}

function renderMemberList(members, surveyVoters) {
  var c = document.getElementById('member-list');
  // 試合終了・完了時はメンバー編集不可
  var canEdit = currentEventStatus === '準備中' || currentEventStatus === '進行中';
  var voters = surveyVoters || cachedSurveyVoters || [];

  if (!members || members.length === 0) {
    c.innerHTML = '<div class="empty-state">' +
      '<svg aria-hidden="true" style="width:48px;height:48px;stroke:var(--border);fill:none;stroke-width:1.5;" viewBox="0 0 24 24">' +
      '<path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/>' +
      '<line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>' +
      '<p>まだ誰もいません...仲間を集めよう！</p>' +
      '<p class="empty-sub">上のフォームからメンバーを追加してください</p></div>';
    return;
  }

  // アイコン凡例 + メンバーリスト
  var h = memberLegendHtml_();
  h += members.map(function(m) {
    var hasAnswered = voters.indexOf(m['名前']) !== -1;
    return memberItemHtml_(m, false, hasAnswered, isAdmin() && canEdit);
  }).join('');
  c.innerHTML = h;

  // メンバー登録フォームの表示制御
  var formSection = document.getElementById('member-form-section');
  if (formSection) {
    formSection.style.display = (isAdmin() && canEdit) ? '' : 'none';
  }
}

/**
 * メンバーアイテムのHTMLを生成する
 * @param {Object} m - メンバーオブジェクト
 * @param {boolean} isQueue - キュー内のメンバーか
 * @param {boolean} hasAnswered - アンケート回答済みか
 * @param {boolean} canDelete - 削除可能か
 * @return {string} HTML文字列
 */
function memberItemHtml_(m, isQueue, hasAnswered, canDelete) {
  var id = isQueue ? '' : m['メンバーID'];
  var name = isQueue ? m.name : m['名前'];
  var years = isQueue ? m.years : m['年次'];
  var expLabel = isQueue ? (m.exp ? 'あり' : 'なし') : m['サッカー経験'];
  var orgLabel = isQueue ? (m.org ? 'はい' : 'いいえ') : m['幹事'];
  var note = isQueue ? (m.note || '') : (m['備考'] || '');

  // アイコン部分
  var icons = '';
  if (expLabel === 'あり') icons += '<span class="member-icon" title="サッカー経験あり">⚽</span>';
  if (orgLabel === 'はい') icons += '<span class="member-icon" title="幹事">👔</span>';
  if (hasAnswered) icons += '<span class="member-icon member-icon-survey" title="アンケート回答済">✓</span>';

  // 削除ボタン
  var deleteBtn = '';
  if (canDelete && id) {
    deleteBtn = '<button class="btn btn-sm btn-danger member-delete-btn" onclick="deleteMember(\'' + id + '\')">' + svg(IC.trash, 14) + '</button>';
  } else if (isQueue) {
    // キュー用の削除は別途renderQueueで処理
  }

  // 2行目: 年次 / 備考
  var subLine = years + '年目';
  if (note) subLine += ' / ' + esc(note);

  return '<div class="member-item-v2">' +
    '<div class="member-main">' +
    '<span class="member-name-v2">' + esc(name) + '</span>' +
    '<span class="member-icons">' + icons + '</span>' +
    deleteBtn +
    '</div>' +
    '<div class="member-sub">' + subLine + '</div>' +
    '</div>';
}

function memberBadgesHtml(m, isQueue, hasAnswered) {
  // キュー用（従来形式を維持）
  var years = isQueue ? m.years : m['年次'];
  var expLabel = isQueue ? (m.exp ? 'あり' : 'なし') : m['サッカー経験'];
  var orgLabel = isQueue ? (m.org ? 'はい' : 'いいえ') : m['幹事'];
  var note = isQueue ? (m.note || '') : (m['備考'] || '');
  var icons = '';
  if (expLabel === 'あり') icons += '<span class="member-icon" title="サッカー経験あり">⚽</span>';
  if (orgLabel === 'はい') icons += '<span class="member-icon" title="幹事">👔</span>';
  return '<span class="badge badge-years">' + years + '年目</span> ' + icons + (note ? ' <span style="color:var(--text-muted);font-size:0.8rem;">' + esc(note) + '</span>' : '');
}

function addToQueue() {
  var name = document.getElementById('m-name').value.trim();
  var years = document.getElementById('m-years').value;
  var exp = document.getElementById('m-exp').value === 'true';
  var org = document.getElementById('m-organizer').checked;
  var noteEl = document.getElementById('m-note');
  var note = noteEl ? noteEl.value.trim() : '';
  if (!name) { showToast('名前を入力してください ✏️', true); return; }
  if (memberQueue.find(function(q) { return q.name === name; })) { showToast(name + ' はもう追加済みです', true); return; }
  memberQueue.push({ name: name, years: Number(years) || 1, exp: exp, org: org, note: note });
  document.getElementById('m-name').value = '';
  var noteEl = document.getElementById('m-note');
  if (noteEl) noteEl.value = '';
  // 備考フィールドを閉じる
  var noteField = document.getElementById('note-field');
  if (noteField) noteField.style.display = 'none';
  document.getElementById('m-name').focus();
  renderQueue();
  showToast(name + ' がエントリー！');
}
function removeFromQueue(index) { memberQueue.splice(index, 1); renderQueue(); }
function renderQueue() {
  var c = document.getElementById('member-queue');
  var btn = document.getElementById('btn-register-all');
  if (memberQueue.length === 0) { c.innerHTML = ''; btn.style.display = 'none'; return; }
  c.innerHTML = '<div style="font-size:0.8rem;font-weight:600;color:var(--text-secondary);margin-bottom:6px;">追加待ち（' + memberQueue.length + '人）</div>' +
    memberQueue.map(function(q, i) {
      return '<div class="member-item"><div><span class="member-name">' + esc(q.name) + '</span>' +
        '<div class="member-badges">' + memberBadgesHtml(q, true) + '</div></div>' +
        '<button class="btn btn-sm btn-danger" onclick="removeFromQueue(' + i + ')">' + svg(IC.x, 12) + '</button></div>';
    }).join('');
  btn.style.display = 'flex';
  btn.innerHTML = svg('<polyline points="20 6 9 17 4 12"/>', 18) + ' 全員エントリー！（' + memberQueue.length + '人）';
}
function registerAllMembers() {
  if (memberQueue.length === 0) return;
  var dataList = memberQueue.map(function(q) { return { name: q.name, years: q.years, exp: q.exp, org: q.org, note: q.note }; });
  callServer('bulkAddMembersFromQueue', [currentEventId, dataList], function(r) {
    memberQueue = []; renderQueue(); showToast(r.message, !r.success); if (r.success) openEvent(currentEventId);
  }, '登録に失敗しました');
}
function deleteMember(memberId) {
  showConfirm('メンバー削除', 'このメンバーを削除しますか？', function() {
    callServer('deleteEventMember', [memberId], function(r) { showToast(r.message, !r.success); if (r.success) openEvent(currentEventId); });
  }, '削除する');
}
</script>
