<script>
// ===================================
// メンバー管理
// ===================================
var memberQueue = [];

/** 備考フィールドの表示/非表示を切り替える */
function toggleNoteField() {
  var field = document.getElementById('note-field');
  if (field.style.display === 'none') {
    field.style.display = 'block';
    document.getElementById('m-note').focus();
  } else {
    field.style.display = 'none';
  }
}

/** アイコン凡例のHTML（見出し横用） */
function memberLegendHtml_() {
  return '<span class="member-legend-inline">👔幹事 ⚽経験あり <span class="legend-survey">✓回答済</span></span>';
}

function renderMemberList(members, surveyVoters) {
  var c = document.getElementById('member-list');
  // 試合終了・完了時はメンバー編集不可
  var canEdit = currentEventStatus === '準備中' || currentEventStatus === '進行中';
  var voters = surveyVoters || cachedSurveyVoters || [];

  if (!members || members.length === 0) {
    c.innerHTML = '<div class="empty-state">' +
      '<svg aria-hidden="true" style="width:48px;height:48px;stroke:var(--border);fill:none;stroke-width:1.5;" viewBox="0 0 24 24">' +
      '<path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/>' +
      '<line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>' +
      '<p>まだ誰もいません...仲間を集めよう！</p>' +
      '<p class="empty-sub">上のフォームからメンバーを追加してください</p></div>';
    return;
  }

  // メンバーリスト（凡例は見出しに含める）
  var h = members.map(function(m) {
    var hasAnswered = voters.indexOf(m['名前']) !== -1;
    return memberItemHtml_(m, false, hasAnswered, isAdmin() && canEdit);
  }).join('');
  c.innerHTML = h;

  // 見出しに凡例を追加
  var heading = document.querySelector('#tab-members .card:last-child h3');
  if (heading && !heading.querySelector('.member-legend-inline')) {
    heading.innerHTML = '登録済みメンバー ' + memberLegendHtml_();
  }

  // メンバー登録フォームの表示制御
  var formSection = document.getElementById('member-form-section');
  if (formSection) {
    formSection.style.display = (isAdmin() && canEdit) ? '' : 'none';
  }
}

/**
 * メンバーアイテムのHTMLを生成する
 * @param {Object} m - メンバーオブジェクト
 * @param {boolean} isQueue - キュー内のメンバーか
 * @param {boolean} hasAnswered - アンケート回答済みか
 * @param {boolean} canEdit - 編集可能か
 * @return {string} HTML文字列
 */
function memberItemHtml_(m, isQueue, hasAnswered, canEdit) {
  var id = isQueue ? '' : m['メンバーID'];
  var a = extractMemberAttrs_(m, isQueue);

  // アイコン部分（幹事→経験→回答済の順）
  var icons = '';
  if (a.orgLabel === 'はい') icons += '<span class="member-icon" title="幹事">👔</span>';
  if (a.expLabel === 'あり') icons += '<span class="member-icon" title="サッカー経験あり">⚽</span>';
  if (hasAnswered) icons += '<span class="member-icon member-icon-survey" title="アンケート回答済">✓</span>';

  // 編集ボタン（管理者のみ）
  var editBtn = '';
  if (canEdit && id) {
    editBtn = '<button class="btn btn-sm btn-secondary member-edit-btn" onclick="openMemberEdit(\'' + id + '\')" title="編集">' +
      '<svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true" style="width:14px;height:14px;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>' +
      '</button>';
  }

  // 名前（n年目）
  var nameWithYears = esc(a.name) + '<span class="member-years">（' + a.years + '年目）</span>';

  // 2行目: 備考
  var subLine = a.note ? esc(a.note) : '';

  // 3行目: 意気込み
  var spirit = isQueue ? '' : (m['意気込み'] || '');

  // クリックで編集（管理者のみ）
  var clickAttr = (canEdit && id) ? ' onclick="openMemberEdit(\'' + id + '\')" style="cursor:pointer;"' : '';

  // 意気込み編集ボタン（自分のメンバーの場合）
  var spiritBtn = '';
  if (!isQueue && id && currentMemberId === id) {
    spiritBtn = '<button class="btn btn-sm btn-secondary" onclick="openSpiritEdit(\'' + id + '\')" style="padding:4px 8px;font-size:0.75rem;">✏️ 意気込み</button>';
  }

  var html = '<div class="member-item-v2">' +
    '<div class="member-main">' +
    '<span class="member-name-v2"' + clickAttr + '>' + nameWithYears + '</span>' +
    '<span class="member-icons">' + icons + '</span>' +
    '<span style="margin-left:auto;display:flex;gap:4px;">' + spiritBtn + editBtn + '</span>' +
    '</div>';
  if (subLine) {
    html += '<div class="member-sub">' + subLine + '</div>';
  }
  if (spirit) {
    html += '<div class="member-sub" style="color:var(--primary);font-style:italic;">🔥 ' + esc(spirit) + '</div>';
  }
  html += '</div>';
  return html;
}

/**
 * メンバーオブジェクトからキュー/登録済み共通の属性を取得する
 * @param {Object} m - メンバーオブジェクト
 * @param {boolean} isQueue - キュー内のメンバーか
 * @return {Object} { name, years, expLabel, orgLabel, note }
 */
function extractMemberAttrs_(m, isQueue) {
  return {
    name: isQueue ? m.name : m['名前'],
    years: isQueue ? m.years : m['年次'],
    expLabel: isQueue ? (m.exp ? 'あり' : 'なし') : m['サッカー経験'],
    orgLabel: isQueue ? (m.org ? 'はい' : 'いいえ') : m['幹事'],
    note: isQueue ? (m.note || '') : (m['備考'] || '')
  };
}

/** キュー表示用のバッジHTML */
function memberBadgesHtml(m, isQueue) {
  var a = extractMemberAttrs_(m, isQueue);
  var icons = '';
  if (a.orgLabel === 'はい') icons += '<span class="member-icon" title="幹事">👔</span>';
  if (a.expLabel === 'あり') icons += '<span class="member-icon" title="サッカー経験あり">⚽</span>';
  return '（' + a.years + '年目） ' + icons + (a.note ? ' <span style="color:var(--text-muted);font-size:0.8rem;">' + esc(a.note) + '</span>' : '');
}

function addToQueue() {
  var name = document.getElementById('m-name').value.trim();
  var years = document.getElementById('m-years').value;
  var exp = document.getElementById('m-exp').value === 'true';
  var org = document.getElementById('m-organizer').checked;
  var noteEl = document.getElementById('m-note');
  var note = noteEl ? noteEl.value.trim() : '';
  if (!name) { showToast('名前を入力してください ✏️', true); return; }
  if (memberQueue.find(function(q) { return q.name === name; })) { showToast(name + ' はもう追加済みです', true); return; }
  memberQueue.push({ name: name, years: Number(years) || 1, exp: exp, org: org, note: note });
  document.getElementById('m-name').value = '';
  if (noteEl) noteEl.value = '';
  var noteField = document.getElementById('note-field');
  if (noteField) noteField.style.display = 'none';
  document.getElementById('m-name').focus();
  renderQueue();
  showToast(name + ' がエントリー！');
}
function removeFromQueue(index) { memberQueue.splice(index, 1); renderQueue(); }
function renderQueue() {
  var c = document.getElementById('member-queue');
  var btn = document.getElementById('btn-register-all');
  if (memberQueue.length === 0) { c.innerHTML = ''; btn.style.display = 'none'; return; }
  c.innerHTML = '<div style="font-size:0.8rem;font-weight:600;color:var(--text-secondary);margin-bottom:6px;">追加待ち（' + memberQueue.length + '人）</div>' +
    memberQueue.map(function(q, i) {
      return '<div class="member-item"><div><span class="member-name">' + esc(q.name) + '</span>' +
        '<div class="member-badges">' + memberBadgesHtml(q, true) + '</div></div>' +
        '<button class="btn btn-sm btn-danger" onclick="removeFromQueue(' + i + ')">' + svg(IC.x, 12) + '</button></div>';
    }).join('');
  btn.style.display = 'flex';
  btn.innerHTML = svg('<polyline points="20 6 9 17 4 12"/>', 18) + ' 全員エントリー！（' + memberQueue.length + '人）';
}
function registerAllMembers() {
  if (memberQueue.length === 0) return;
  var dataList = memberQueue.map(function(q) { return { name: q.name, years: q.years, exp: q.exp, org: q.org, note: q.note }; });
  callServer('bulkAddMembersFromQueue', [currentEventId, dataList], function(r) {
    memberQueue = []; renderQueue(); showToast(r.message, !r.success); if (r.success) openEvent(currentEventId);
  }, '登録に失敗しました');
}
function deleteMember(memberId) {
  showConfirm('メンバー削除', 'このメンバーを削除しますか？', function() {
    callServer('deleteEventMember', [memberId], function(r) { showToast(r.message, !r.success); if (r.success) openEvent(currentEventId); });
  }, '削除する');
}

// ===================================
// メンバー編集
// ===================================
var editingMemberId = null;

/**
 * メンバー編集モーダルを開く
 * @param {string} memberId - メンバーID
 */
function openMemberEdit(memberId) {
  var member = currentMembers.find(function(m) { return m['メンバーID'] === memberId; });
  if (!member) { showToast('メンバーが見つかりません', true); return; }

  editingMemberId = memberId;

  // モーダルにデータをセット
  document.getElementById('edit-m-name').value = member['名前'] || '';
  document.getElementById('edit-m-years').value = member['年次'] || 1;
  document.getElementById('edit-m-exp').value = member['サッカー経験'] === 'あり' ? 'true' : 'false';
  document.getElementById('edit-m-organizer').checked = member['幹事'] === 'はい';
  document.getElementById('edit-m-note').value = member['備考'] || '';

  // 意気込み（管理者編集時も表示）
  var spiritEl = document.getElementById('edit-m-spirit');
  if (spiritEl) spiritEl.value = member['意気込み'] || '';

  // モーダル表示
  document.getElementById('member-edit-modal').style.display = 'flex';
}

/** メンバー編集モーダルを閉じる */
function closeMemberEdit() {
  document.getElementById('member-edit-modal').style.display = 'none';
  editingMemberId = null;
}

/** メンバー情報を保存する */
function saveMemberEdit() {
  if (!editingMemberId) return;

  var data = {
    name: document.getElementById('edit-m-name').value.trim(),
    years: Number(document.getElementById('edit-m-years').value) || 1,
    exp: document.getElementById('edit-m-exp').value === 'true',
    org: document.getElementById('edit-m-organizer').checked,
    note: document.getElementById('edit-m-note').value.trim(),
    spirit: (document.getElementById('edit-m-spirit') || {}).value || ''
  };

  if (!data.name) {
    showToast('名前を入力してください', true);
    return;
  }

  callServer('updateMember', [editingMemberId, data], function(r) {
    showToast(r.message, !r.success);
    if (r.success) {
      closeMemberEdit();
      openEvent(currentEventId);
    }
  });
}

/** メンバーを削除する（編集モーダルから） */
function deleteMemberFromEdit() {
  if (!editingMemberId) return;
  closeMemberEdit();
  deleteMember(editingMemberId);
}

// ===================================
// 意気込み編集（一般ユーザー用）
// ===================================

/**
 * 意気込み編集モーダルを開く
 * @param {string} memberId - メンバーID
 */
function openSpiritEdit(memberId) {
  var member = currentMembers.find(function(m) { return m['メンバーID'] === memberId; });
  if (!member) return;
  var container = document.getElementById('modal-container');
  container.innerHTML = '<div class="modal-overlay" id="modal-overlay">' +
    '<div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="spirit-title">' +
    '<h3 id="spirit-title">意気込みを入力</h3>' +
    '<input type="text" id="spirit-input" class="input" placeholder="今日の意気込みを一言！" maxlength="50" value="' + esc(member['意気込み'] || '') + '">' +
    '<div class="modal-actions" style="margin-top:12px;">' +
    '<button class="btn btn-secondary" id="spirit-cancel">キャンセル</button>' +
    '<button class="btn btn-primary" id="spirit-save">保存</button>' +
    '</div></div></div>';
  document.getElementById('spirit-cancel').onclick = function() { container.innerHTML = ''; };
  document.getElementById('spirit-save').onclick = function() {
    var val = document.getElementById('spirit-input').value.trim();
    container.innerHTML = '';
    callServer('updateMemberSpirit', [memberId, val], function(r) {
      showToast(r.message, !r.success);
      if (r.success) openEvent(currentEventId);
    });
  };
  document.getElementById('modal-overlay').onclick = function(e) {
    if (e.target === this) container.innerHTML = '';
  };
  document.getElementById('spirit-input').focus();
}
</script>
