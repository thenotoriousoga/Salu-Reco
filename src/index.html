<!DOCTYPE html>
<html lang="ja">
<head>
  <base target="_top">
  <?!= include('css'); ?>
</head>
<body>
  <!-- ヘッダー -->
  <header class="header">
    <div class="header-inner">
      <h1>
        <svg class="header-logo" viewBox="0 0 36 36" aria-hidden="true">
          <defs>
            <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#FBBF24"/>
              <stop offset="100%" stop-color="#D97706"/>
            </linearGradient>
          </defs>
          <!-- ボール外周 -->
          <circle cx="18" cy="20" r="12" fill="none" stroke="url(#logo-grad)" stroke-width="2"/>
          <!-- 五角形パネル（中央） -->
          <polygon points="18,13.5 21.5,16 20.2,20 15.8,20 14.5,16" fill="url(#logo-grad)" opacity="0.9"/>
          <!-- 五角形から外周への線 -->
          <line x1="18" y1="13.5" x2="18" y2="8" stroke="url(#logo-grad)" stroke-width="1.2"/>
          <line x1="21.5" y1="16" x2="26.5" y2="13.5" stroke="url(#logo-grad)" stroke-width="1.2"/>
          <line x1="20.2" y1="20" x2="25" y2="24" stroke="url(#logo-grad)" stroke-width="1.2"/>
          <line x1="15.8" y1="20" x2="11" y2="24" stroke="url(#logo-grad)" stroke-width="1.2"/>
          <line x1="14.5" y1="16" x2="9.5" y2="13.5" stroke="url(#logo-grad)" stroke-width="1.2"/>
          <!-- 王冠 -->
          <path d="M13 6l2 3.5h6l2-3.5" fill="none" stroke="#FBBF24" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="15" cy="5.2" r="1" fill="#FBBF24"/>
          <circle cx="18" cy="4" r="1.2" fill="#D97706"/>
          <circle cx="21" cy="5.2" r="1" fill="#FBBF24"/>
        </svg>
        Salu-Rec
      </h1>
      <button id="btn-logout" class="btn-logout" onclick="doLogout()" style="display:none;" aria-label="ログアウト">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </header>

  <main class="content">

    <!-- ===== ログイン画面 ===== -->
    <div id="page-login" class="page active">
      <div class="login-hero">
        <div class="login-hero-icon">
          <svg class="login-logo" viewBox="0 0 80 80" aria-hidden="true">
            <defs>
              <linearGradient id="login-logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#FBBF24"/>
                <stop offset="50%" stop-color="#D97706"/>
                <stop offset="100%" stop-color="#B45309"/>
              </linearGradient>
              <linearGradient id="login-crown-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#FDE68A"/>
                <stop offset="100%" stop-color="#FBBF24"/>
              </linearGradient>
            </defs>
            <!-- ボール外周 -->
            <circle cx="40" cy="44" r="26" fill="none" stroke="url(#login-logo-grad)" stroke-width="3"/>
            <!-- 五角形パネル（中央） -->
            <polygon points="40,30 47.5,35.5 44.6,44 35.4,44 32.5,35.5" fill="url(#login-logo-grad)" opacity="0.85"/>
            <!-- 五角形から外周への線 -->
            <line x1="40" y1="30" x2="40" y2="18" stroke="url(#login-logo-grad)" stroke-width="2"/>
            <line x1="47.5" y1="35.5" x2="58.5" y2="30" stroke="url(#login-logo-grad)" stroke-width="2"/>
            <line x1="44.6" y1="44" x2="56" y2="53" stroke="url(#login-logo-grad)" stroke-width="2"/>
            <line x1="35.4" y1="44" x2="24" y2="53" stroke="url(#login-logo-grad)" stroke-width="2"/>
            <line x1="32.5" y1="35.5" x2="21.5" y2="30" stroke="url(#login-logo-grad)" stroke-width="2"/>
            <!-- 王冠 -->
            <path d="M28 14l5 8h14l5-8" fill="none" stroke="url(#login-crown-grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="33" cy="12" r="2.5" fill="#FBBF24"/>
            <circle cx="40" cy="9" r="3" fill="#D97706"/>
            <circle cx="47" cy="12" r="2.5" fill="#FBBF24"/>
          </svg>
        </div>
        <h2 class="login-hero-title">Salu-Rec</h2>
        <p class="login-hero-sub">イベントコードを入力して参加</p>
      </div>
      <div class="card login-card">
        <div class="login-code-input-wrap">
          <input type="text" id="login-code" placeholder="コードを入力" class="login-code-input" maxlength="10" autocomplete="off" aria-label="イベントコード">
        </div>
        <button class="btn btn-primary btn-large" onclick="doLoginWithCode()">
          <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          参加する
        </button>
      </div>
      <div class="login-admin-area">
        <a href="javascript:void(0)" onclick="toggleAdminLogin()" class="admin-toggle-link">管理者はこちら</a>
        <div id="admin-login-form" style="display:none;">
          <div class="card login-card" style="margin-top:12px;">
            <div class="input-group">
              <label for="login-password">パスワード</label>
              <input type="password" id="login-password" placeholder="管理者パスワード" class="input">
            </div>
            <button class="btn btn-secondary btn-large" onclick="doLoginAdmin()">
              <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
              ログイン
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== イベント一覧 ===== -->
    <div id="page-events" class="page">
      <div id="event-list-view">
        <div class="card admin-only">
          <h2>
            <svg class="section-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            イベント管理
          </h2>
          <div class="input-group">
            <label for="ev-name">名称</label>
            <input type="text" id="ev-name" value="フットサル" class="input">
          </div>
          <div class="input-group">
            <label for="ev-date">日付</label>
            <input type="date" id="ev-date" class="input">
          </div>
          <div class="input-group">
            <label for="ev-code">参加コード</label>
            <input type="text" id="ev-code" placeholder="例: AB12" class="input" maxlength="10" style="text-transform:uppercase;font-family:'Fira Code',monospace;">
          </div>
          <button class="btn btn-primary btn-large" onclick="createNewEvent()">
            <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            新しいイベントを作成
          </button>
        </div>
        <div class="card">
          <h3>イベント一覧</h3>
          <div id="event-list">読み込み中...</div>
        </div>
      </div>

      <!-- ===== イベント詳細 ===== -->
      <div id="event-detail-view" style="display:none;">

        <!-- ヘッダー -->
        <div class="card">
          <div class="ev-detail-nav">
            <button class="btn btn-sm btn-secondary admin-only" onclick="backToEventList()" style="margin-bottom:12px;">
              <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
              一覧に戻る
            </button>
          </div>
          <h2 id="ev-detail-title">イベント詳細</h2>
          <div id="ev-detail-status"></div>
          <div id="ev-detail-code" class="admin-only" style="margin-top:8px;"></div>
        </div>

        <!-- タブ切り替え -->
        <div class="tab-bar">
          <button class="tab-btn active" data-tab="tab-members" onclick="switchTab('tab-members')">メンバー</button>
          <button class="tab-btn" data-tab="tab-rounds" onclick="switchTab('tab-rounds')">試合</button>
          <button class="tab-btn" data-tab="tab-results" onclick="switchTab('tab-results')">結果</button>
        </div>

        <!-- タブ: メンバー -->
        <div id="tab-members" class="tab-content active">
          <div class="card admin-only">
            <h3>
              <svg class="section-icon" style="width:18px;height:18px;" viewBox="0 0 24 24" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
              メンバー登録
            </h3>
            <!-- 名前（メイン入力） -->
            <div class="member-form-name">
              <input type="text" id="m-name" placeholder="名前を入力" class="input input-name" aria-label="名前">
            </div>
            <!-- 属性グリッド -->
            <div class="member-form-attrs">
              <div class="attr-item">
                <label for="m-years" class="attr-label">年次</label>
                <input type="number" id="m-years" value="1" min="1" max="50" class="input attr-input">
              </div>
              <div class="attr-item">
                <label for="m-exp" class="attr-label">経験</label>
                <select id="m-exp" class="input attr-input">
                  <option value="false">なし</option>
                  <option value="true">あり</option>
                </select>
              </div>
              <div class="attr-item">
                <label class="attr-label attr-label-cb">
                  <input type="checkbox" id="m-organizer"> 幹事
                </label>
              </div>
            </div>
            <!-- 備考（トグル） -->
            <div class="member-form-note">
              <a href="javascript:void(0)" class="note-toggle" onclick="toggleNoteField()">
                <svg aria-hidden="true" style="width:14px;height:14px;display:inline;vertical-align:middle;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                備考を追加
              </a>
              <div id="note-field" style="display:none;margin-top:8px;">
                <input type="text" id="m-note" placeholder="初参加、久しぶり、役職など" class="input" aria-label="備考">
              </div>
            </div>
            <!-- 追加ボタン -->
            <button class="btn btn-secondary btn-large" onclick="addToQueue()">
              <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              リストに追加
            </button>

            <!-- 追加待ちリスト -->
            <div id="member-queue" class="mt-md"></div>

            <button class="btn btn-primary btn-large mt-sm" id="btn-register-all" onclick="registerAllMembers()" style="display:none;">
              <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
              まとめて登録
            </button>
          </div>
          <div class="card">
            <h3>登録済みメンバー</h3>
            <div id="member-list">読み込み中...</div>
          </div>
        </div>

        <!-- タブ: 試合 -->
        <div id="tab-rounds" class="tab-content">
          <!-- ラウンド作成（進行中ラウンドがない場合のみ表示） -->
          <div class="card" id="round-create-section">
            <h3>
              <svg class="section-icon" style="width:18px;height:18px;" viewBox="0 0 24 24" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              新しいラウンドを作成
            </h3>
            <div class="step-indicator" id="round-steps">
              <span class="step active" id="step-select">① メンバー選択</span>
              <span class="step" id="step-split">② チーム分け</span>
              <span class="step" id="step-start">③ 試合開始</span>
            </div>

            <!-- ステップ1: メンバー選択 -->
            <div id="split-step1">
              <div class="step-actions" style="margin-bottom:8px;">
                <button class="btn btn-sm btn-secondary" onclick="selectAllP()">全選択</button>
                <button class="btn btn-sm btn-secondary" onclick="deselectAllP()">全解除</button>
              </div>
              <div id="p-checkboxes">読み込み中...</div>
              <div class="team-name-inputs" style="margin-top:12px;">
                <div class="input-group">
                  <label for="r-team-count">チーム数</label>
                  <select id="r-team-count" class="input" onchange="updateTeamNameInputs()">
                    <option value="2">2チーム</option>
                  </select>
                </div>
                <div id="team-name-fields">
                  <div class="input-group">
                    <label for="r-team-0">チームA</label>
                    <input type="text" id="r-team-0" value="チームA" class="input">
                  </div>
                  <div class="input-group">
                    <label for="r-team-1">チームB</label>
                    <input type="text" id="r-team-1" value="チームB" class="input">
                  </div>
                </div>
              </div>
              <button class="btn btn-primary btn-large" onclick="goToSplitBoard()">
                <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
                チーム分けへ進む
              </button>
            </div>

            <!-- ステップ2: ドラッグ&ドロップ チーム分けボード -->
            <div id="split-step2" style="display:none;">
              <div class="split-board-actions">
                <button class="btn btn-sm btn-accent" onclick="doAutoAssign()">
                  <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                  AI自動配置
                </button>
                <button class="btn btn-sm btn-secondary" onclick="resetSplitBoard()">
                  <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                  リセット
                </button>
                <button class="btn btn-sm btn-secondary" onclick="backToStep1()">
                  <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                  戻る
                </button>
              </div>
              <div id="split-board"></div>
              <button class="btn btn-primary btn-large" id="btn-create-round" onclick="doCreateRound()" style="display:none;margin-top:12px;">
                <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                このチーム分けでラウンド作成
              </button>
            </div>
          </div>

          <!-- ラウンド一覧 -->
          <div id="rounds-list"></div>
        </div>

        <!-- タブ: 結果（アンケート・MVP・成績） -->
        <div id="tab-results" class="tab-content">
          <div class="card">
            <h3>
              <svg class="section-icon" style="width:18px;height:18px;" viewBox="0 0 24 24" aria-hidden="true"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
              イベント内成績
            </h3>
            <div id="event-stats">読み込み中...</div>
          </div>
          <div class="card" id="post-match-section">
            <h3>
              <svg class="section-icon" style="width:18px;height:18px;" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5C7 4 9 7 12 7s5-3 7.5-3a2.5 2.5 0 0 1 0 5H18"/><path d="M18 9v10a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V9"/><path d="M12 7v14"/></svg>
              アンケート・MVP選出
            </h3>
            <div id="post-match-content"></div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- ローディング -->
  <div id="loading" class="loading" style="display:none;" role="status" aria-label="読み込み中">
    <div class="loading-content">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- カスタムモーダル -->
  <div id="modal-container"></div>

  <!-- トースト通知 -->
  <div id="toast" class="toast" role="alert" aria-live="polite"></div>

  <?!= include('js'); ?>
  <?!= include('js-members'); ?>
  <?!= include('js-rounds'); ?>
  <?!= include('js-results'); ?>
</body>
</html>
