<!DOCTYPE html>
<html lang="ja">
<head>
  <base target="_top">
  <?!= include('css'); ?>
</head>
<body>
  <!-- ヘッダー -->
  <header class="header">
    <h1>
      <svg class="header-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 0 20 10 10 0 0 1 0-20m4.5 5.5L13 10l3.5 2.5-1.5 4h-6l-1.5-4L11 10 7.5 7.5"/></svg>
      Futsal Manager
    </h1>
  </header>

  <main class="content">

    <!-- ===== ログイン画面 ===== -->
    <div id="page-login" class="page active">
      <div class="card login-card">
        <div class="login-logo">
          <svg viewBox="0 0 24 24" class="login-logo-icon"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 0 20 10 10 0 0 1 0-20m4.5 5.5L13 10l3.5 2.5-1.5 4h-6l-1.5-4L11 10 7.5 7.5"/></svg>
          <h2>Futsal Manager</h2>
        </div>
        <div class="login-section">
          <h3>
            <svg class="section-icon" style="width:18px;height:18px;" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            イベントに参加
          </h3>
          <p class="login-desc">イベントコードを入力して参加します</p>
          <div class="input-group">
            <label for="login-code">コード</label>
            <input type="text" id="login-code" placeholder="例: AB12" class="input" maxlength="4" style="text-transform:uppercase;font-family:'Fira Code',monospace;font-size:1.2rem;letter-spacing:0.1em;text-align:center;">
          </div>
          <button class="btn btn-primary btn-large" onclick="doLoginWithCode()">
            <svg class="btn-icon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            参加する
          </button>
        </div>
        <div class="login-divider"><span>または</span></div>
        <div class="login-section">
          <h3>
            <svg class="section-icon" style="width:18px;height:18px;" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            管理者ログイン
          </h3>
          <div class="input-group">
            <label for="login-password">パスワード</label>
            <input type="password" id="login-password" placeholder="管理者パスワード" class="input">
          </div>
          <button class="btn btn-secondary btn-large" onclick="doLoginAdmin()">
            <svg class="btn-icon" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
            ログイン
          </button>
        </div>
      </div>
    </div>

    <!-- ===== イベント一覧 ===== -->
    <div id="page-events" class="page">
      <div id="event-list-view">
        <div class="card admin-only">
          <h2>
            <svg class="section-icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            イベント管理
          </h2>
          <div class="input-group">
            <label for="ev-name">名称</label>
            <input type="text" id="ev-name" value="フットサル" class="input">
          </div>
          <div class="input-group">
            <label for="ev-date">日付</label>
            <input type="date" id="ev-date" class="input">
          </div>
          <div class="input-group">
            <label for="ev-code">参加コード</label>
            <input type="text" id="ev-code" placeholder="例: AB12" class="input" maxlength="10" style="text-transform:uppercase;font-family:'Fira Code',monospace;">
          </div>
          <button class="btn btn-primary btn-large" onclick="createNewEvent()">
            <svg class="btn-icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            新しいイベントを作成
          </button>
        </div>
        <div class="card">
          <h3>イベント一覧</h3>
          <div id="event-list">読み込み中...</div>
        </div>
      </div>

      <!-- ===== イベント詳細 ===== -->
      <div id="event-detail-view" style="display:none;">

        <!-- ヘッダー -->
        <div class="card">
          <div class="ev-detail-nav">
            <button class="btn btn-sm btn-secondary admin-only" onclick="backToEventList()" style="margin-bottom:12px;">
              <svg class="btn-icon" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
              一覧に戻る
            </button>
            <button class="btn btn-sm btn-secondary user-only" onclick="doLogout()" style="margin-bottom:12px;">
              <svg class="btn-icon" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              ログアウト
            </button>
          </div>
          <h2 id="ev-detail-title">イベント詳細</h2>
          <div id="ev-detail-status"></div>
          <div id="ev-detail-code" class="admin-only" style="margin-top:8px;"></div>
        </div>

        <!-- タブ切り替え -->
        <div class="tab-bar">
          <button class="tab-btn active" data-tab="tab-members" onclick="switchTab('tab-members')">メンバー</button>
          <button class="tab-btn" data-tab="tab-rounds" onclick="switchTab('tab-rounds')">試合</button>
          <button class="tab-btn" data-tab="tab-results" onclick="switchTab('tab-results')">結果</button>
        </div>

        <!-- タブ: メンバー -->
        <div id="tab-members" class="tab-content active">
          <div class="card admin-only">
            <h3>
              <svg class="section-icon" style="width:18px;height:18px;" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
              メンバー登録
            </h3>
            <div class="input-group">
              <label for="m-name">名前</label>
              <input type="text" id="m-name" placeholder="名前" class="input" aria-label="名前">
            </div>
            <div class="input-row">
              <div class="input-group" style="flex:1;">
                <label for="m-years">年次</label>
                <input type="number" id="m-years" value="1" min="1" max="50" class="input">
              </div>
              <div class="input-group" style="flex:1;">
                <label for="m-exp">経験</label>
                <select id="m-exp" class="input">
                  <option value="false">なし</option>
                  <option value="true">あり</option>
                </select>
              </div>
            </div>
            <div class="input-group">
              <label class="checkbox-label">
                <input type="checkbox" id="m-organizer"> 幹事
              </label>
            </div>
            <div class="input-group">
              <label for="m-note">備考</label>
              <input type="text" id="m-note" placeholder="役職、スキルなど" class="input" aria-label="備考">
            </div>
            <button class="btn btn-secondary" onclick="addToQueue()" style="width:100%;">
              <svg class="btn-icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              リストに追加
            </button>

            <!-- 追加待ちリスト -->
            <div id="member-queue" style="margin-top:12px;"></div>

            <button class="btn btn-primary btn-large" id="btn-register-all" onclick="registerAllMembers()" style="display:none;margin-top:10px;">
              <svg class="btn-icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
              まとめて登録
            </button>
          </div>
          <div class="card">
            <h3>登録済みメンバー</h3>
            <div id="member-list">読み込み中...</div>
          </div>
        </div>

        <!-- タブ: 試合 -->
        <div id="tab-rounds" class="tab-content">
          <!-- ラウンド作成（進行中ラウンドがない場合のみ表示） -->
          <div class="card" id="round-create-section">
            <h3>
              <svg class="section-icon" style="width:18px;height:18px;" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              新しいラウンドを作成
            </h3>
            <div class="step-actions" style="margin-bottom:8px;">
              <button class="btn btn-sm btn-secondary" onclick="selectAllP()">全選択</button>
              <button class="btn btn-sm btn-secondary" onclick="deselectAllP()">全解除</button>
            </div>
            <div id="p-checkboxes">読み込み中...</div>
            <div class="team-name-inputs" style="margin-top:12px;">
              <div class="input-group">
                <label for="r-team-count">チーム数</label>
                <select id="r-team-count" class="input" onchange="updateTeamNameInputs()">
                  <option value="2">2チーム</option>
                </select>
              </div>
              <div id="team-name-fields">
                <div class="input-group">
                  <label for="r-team-0">チームA</label>
                  <input type="text" id="r-team-0" value="チームA" class="input">
                </div>
                <div class="input-group">
                  <label for="r-team-1">チームB</label>
                  <input type="text" id="r-team-1" value="チームB" class="input">
                </div>
              </div>
            </div>
            <div class="split-buttons">
              <button class="btn btn-accent" onclick="doAutoSplit()" style="flex:1;">
                <svg class="btn-icon" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                AI分け
              </button>
              <button class="btn btn-secondary" onclick="doManualSplit()" style="flex:1;">
                <svg class="btn-icon" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
                手動分け
              </button>
            </div>
            <div id="manual-split-area" style="display:none;"></div>
            <div id="teams-preview" style="display:none;"></div>
            <div id="match-selector" style="display:none;"></div>
            <button class="btn btn-primary btn-large" id="btn-create-round" onclick="doCreateRound()" style="display:none;margin-top:12px;">
              <svg class="btn-icon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              この組み合わせで試合開始
            </button>
          </div>

          <!-- ラウンド一覧 -->
          <div id="rounds-list"></div>
        </div>

        <!-- タブ: 結果（アンケート・MVP・成績） -->
        <div id="tab-results" class="tab-content">
          <div class="card">
            <h3>
              <svg class="section-icon" style="width:18px;height:18px;" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
              イベント内成績
            </h3>
            <div id="event-stats">読み込み中...</div>
          </div>
          <div class="card" id="post-match-section">
            <h3>
              <svg class="section-icon" style="width:18px;height:18px;" viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5C7 4 9 7 12 7s5-3 7.5-3a2.5 2.5 0 0 1 0 5H18"/><path d="M18 9v10a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V9"/><path d="M12 7v14"/></svg>
              アンケート・MVP選出
            </h3>
            <div id="post-match-content"></div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- ローディング -->
  <div id="loading" class="loading" style="display:none;" role="status" aria-label="読み込み中">
    <div class="spinner"></div>
  </div>

  <!-- トースト通知 -->
  <div id="toast" class="toast" role="alert" aria-live="polite"></div>

  <?!= include('js'); ?>
  <?!= include('js-members'); ?>
  <?!= include('js-rounds'); ?>
  <?!= include('js-results'); ?>
</body>
</html>
