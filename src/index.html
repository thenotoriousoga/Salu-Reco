<!DOCTYPE html>

</head>
<body>

      <svg class="header-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 0 20 10 10 0 0 1 0-20m4.5 5.5L13 10l3.5 2.5-1.5 4h-6l-1.5-4L11 10 7.5 7.5"/></svg>

  <!-- ナビゲーション -->
  <nav class="nav" role="navigation" aria-label="メインナビゲーション">

      ホーム
    </button>
    <button class="nav-btn" data-page="members" onclick="showPage('members')" aria-label="メンバー">
      <svg class="nav-icon" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      メンバー
    </button>
    <button class="nav-btn" data-page="event" onclick="showPage('event')" aria-label="イベント">
      <svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      イベント
    </button>
    <button class="nav-btn" data-page="stats" onclick="showPage('stats')" aria-label="成績">
      <svg class="nav-icon" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      成績
    </button>
  </nav>

  <!-- ページコンテンツ -->
  <main class="content">

    <!-- ===== ホーム ===== -->
    <div id="page-home" class="page active">
      <div class="card">
        <h2>
          <svg class="section-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 0 20 10 10 0 0 1 0-20m4.5 5.5L13 10l3.5 2.5-1.5 4h-6l-1.5-4L11 10 7.5 7.5"/></svg>
          Futsal Manager
        </h2>
        <p>フットサルの試合管理・MVP選出システムです。</p>
        <div class="home-menu">
          <button class="btn btn-primary btn-large" onclick="showPage('event')">
            <svg class="btn-icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            イベントを管理する
          </button>
          <button class="btn btn-accent btn-large" onclick="showPage('stats')">
            <svg class="btn-icon" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            成績を見る
          </button>
          <button class="btn btn-secondary btn-large" onclick="showPage('members')">
            <svg class="btn-icon" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            メンバー管理
          </button>
        </div>
      </div>
      <div class="card">
        <h3>
          <svg class="section-icon" style="width:18px;height:18px;" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          最近のイベント
        </h3>
        <div id="recent-events">読み込み中...</div>
      </div>
    </div>

    <!-- ===== メンバー管理 ===== -->
    <div id="page-members" class="page">
      <div class="card">
        <h2>
          <svg class="section-icon" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          メンバー管理
        </h2>
        <div id="member-form">
          <div class="input-group">
            <label for="m-name">名前</label>
            <input type="text" id="m-name" placeholder="名前" class="input" aria-label="名前">
          </div>
          <div class="input-row">
            <div class="input-group" style="flex:1;">
              <label for="m-years">年次</label>
              <input type="number" id="m-years" value="1" min="1" max="50" class="input" aria-label="年次">
            </div>
            <div class="input-group" style="flex:1;">
              <label for="m-exp">サッカー経験</label>
              <select id="m-exp" class="input" aria-label="サッカー経験">
                <option value="false">なし</option>
                <option value="true">あり</option>
              </select>
            </div>
          </div>
          <div class="input-group">
            <label class="checkbox-label">
              <input type="checkbox" id="m-organizer"> 幹事
            </label>
          </div>
          <button class="btn btn-primary btn-large" onclick="addMember()">
            <svg class="btn-icon" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
            メンバーを追加
          </button>
        </div>
      </div>
      <div class="card">
        <h3>登録済みメンバー</h3>
        <div id="member-list">読み込み中...</div>
      </div>
    </div>

    <!-- ===== イベント ===== -->
    <div id="page-event" class="page">
      <!-- イベント一覧 -->
      <div id="event-list-view">
        <div class="card">
          <h2>
            <svg class="section-icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            イベント管理
          </h2>
          <div class="input-group">
            <label for="ev-name">名称</label>
            <input type="text" id="ev-name" value="フットサル" class="input">
          </div>
          <div class="input-group">
            <label for="ev-date">日付</label>
            <input type="date" id="ev-date" class="input">
          </div>
          <button class="btn btn-primary btn-large" onclick="createNewEvent()">
            <svg class="btn-icon" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            新しいイベントを作成
          </button>
        </div>
        <div class="card">
          <h3>イベント一覧</h3>
          <div id="event-list">読み込み中...</div>
        </div>
      </div>

      <!-- イベント詳細 -->
      <div id="event-detail-view" style="display:none;">
        <div class="card">
          <button class="btn btn-sm btn-secondary" onclick="backToEventList()" style="margin-bottom:12px;">
            <svg class="btn-icon" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            一覧に戻る
          </button>
          <h2 id="event-detail-title">イベント詳細</h2>
          <div id="event-detail-status"></div>
        </div>

        <!-- ラウンド作成 -->
        <div class="card" id="round-create-section">
          <h3>
            <svg class="section-icon" style="width:18px;height:18px;" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            新しい試合（ラウンド）を追加
          </h3>
          <div class="step-actions" style="margin-bottom:8px;">
            <button class="btn btn-sm btn-secondary" onclick="selectAllParticipants()">全選択</button>
            <button class="btn btn-sm btn-secondary" onclick="deselectAllParticipants()">全解除</button>
          </div>
          <div id="participant-checkboxes">読み込み中...</div>
          <div class="team-name-inputs" style="margin-top:12px;">
            <div class="input-group">
              <label for="r-team-a">チームA</label>
              <input type="text" id="r-team-a" value="チームA" class="input">
            </div>
            <div class="input-group">
              <label for="r-team-b">チームB</label>
              <input type="text" id="r-team-b" value="チームB" class="input">
            </div>
          </div>
          <div class="split-buttons">
            <button class="btn btn-accent" onclick="doAutoSplit()" style="flex:1;">
              <svg class="btn-icon" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
              AI分け
            </button>
            <button class="btn btn-secondary" onclick="doRandomSplit()" style="flex:1;">
              <svg class="btn-icon" viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
              ランダム
            </button>
          </div>
          <div class="teams-preview" id="teams-preview" style="display:none;">
            <div class="team-box team-a">
              <h4 id="preview-a-name">チームA</h4>
              <div id="preview-a-list"></div>
            </div>
            <div class="team-box team-b">
              <h4 id="preview-b-name">チームB</h4>
              <div id="preview-b-list"></div>
            </div>
          </div>
          <button class="btn btn-primary btn-large" id="btn-create-round" onclick="createRound()" style="display:none;margin-top:12px;">
            <svg class="btn-icon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            この組み合わせで試合開始
          </button>
        </div>

        <!-- ラウンド一覧 -->
        <div id="rounds-list"></div>

        <!-- アンケート・MVP セクション -->
        <div class="card" id="post-match-section">
          <h3>
            <svg class="section-icon" style="width:18px;height:18px;" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            試合後の処理
          </h3>
          <div id="post-match-content"></div>
        </div>
      </div>
    </div>

    <!-- ===== 成績 ===== -->
    <div id="page-stats" class="page">
      <div class="card">
        <h2>
          <svg class="section-icon" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          個人成績
        </h2>
        <div class="stats-sort">
          <label for="stats-sort">並び替え:</label>
          <select id="stats-sort" class="input" onchange="loadStats()">
            <option value="goals">得点数</option>
            <option value="wins">勝利数</option>
            <option value="mvp">MVP回数</option>
            <option value="played">出場数</option>
          </select>
        </div>
        <div id="stats-table">読み込み中...</div>
      </div>
    </div>
  </main>

  <!-- ローディング -->
  <div id="loading" class="loading" style="display:none;" role="status" aria-label="読み込み中">

  </div>

  <div id="toast" class="toast" role="alert" aria-live="polite"></div>
