<script>
// ===================================
// Salu-Rec - クライアントサイドJS（コア）
// 状態管理、ユーティリティ、ページ遷移
// ===================================

// --- グローバル状態 ---
var currentEventId = null;
var currentMembers = [];
var cachedRounds = [];    // ラウンド一覧（マッチ含む）
var previewTeams = [];    // チーム分けプレビュー: [ [id,...], ... ]
var previewNames = [];    // チーム名: [ 'チームA', ... ]
var currentRole = null;    // 'admin' or 'user' or null
var currentEventStatus = null; // イベントのステータス

// --- 定数 ---
var TEAM_CLASSES_ = ['a', 'b', 'c', 'd', 'e'];
var SESSION_TTL_ = 24 * 60 * 60 * 1000; // セッション有効期限: 24時間（ミリ秒）

// ===================================
// SVGアイコンヘルパー
// ===================================

/**
 * SVGアイコンを生成する
 * @param {string} paths - SVGのpath要素
 * @param {number} [size=14] - アイコンサイズ
 * @return {string} SVG HTML文字列
 */
function svg(paths, size) {
  size = size || 14;
  return '<svg aria-hidden="true" style="width:' + size + 'px;height:' + size + 'px;display:inline;vertical-align:middle;' +
    'stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;" viewBox="0 0 24 24">' +
    paths + '</svg>';
}

/** アイコン定義 */
var IC = {
  goal: '<circle cx="12" cy="12" r="10"/>',
  trophy: '<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5C7 4 9 7 12 7s5-3 7.5-3a2.5 2.5 0 0 1 0 5H18"/><path d="M18 9v10a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V9"/><path d="M12 7v14"/>',
  check: '<polyline points="20 6 9 17 4 12"/>',
  x: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
  minus: '<line x1="5" y1="12" x2="19" y2="12"/>',
  file: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>',
  trash: '<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>',
  flag: '<path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/>',
  more: '<circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/>'
};

// ===================================
// ユーティリティ関数
// ===================================

/**
 * HTMLエスケープ
 * @param {string} t - エスケープする文字列
 * @return {string} エスケープ済み文字列
 */
function esc(t) {
  var d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

/**
 * ローディング表示
 * @param {string} [msg] - メッセージ
 * @param {string} [sub] - サブメッセージ
 */
function showLoading(msg, sub) {
  var el = document.getElementById('loading');
  var content = el.querySelector('.loading-content');
  if (msg) {
    content.innerHTML = '<div class="spinner"></div><p>' + esc(msg) + '</p>' +
      (sub ? '<p class="loading-sub">' + esc(sub) + '</p>' : '');
  } else {
    content.innerHTML = '<div class="spinner"></div>';
  }
  el.style.display = 'flex';
}

/** ローディング非表示 */
function hideLoading() {
  var el = document.getElementById('loading');
  el.style.display = 'none';
  var content = el.querySelector('.loading-content');
  content.innerHTML = '<div class="spinner"></div>';
}

/**
 * トースト通知を表示
 * @param {string} msg - メッセージ
 * @param {boolean} [err] - エラーかどうか
 */
function showToast(msg, err) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (err ? ' error' : '');
  setTimeout(function() { t.className = 'toast'; }, 2500);
}

/**
 * サーバー関数を呼び出す（ローディング・エラーハンドリング付き）
 * @param {string} funcName - サーバー関数名
 * @param {Array} args - 引数配列
 * @param {Function} onSuccess - 成功時コールバック
 * @param {string} [errorMsg] - エラー時メッセージ
 */
function callServer(funcName, args, onSuccess, errorMsg) {
  showLoading();
  var runner = google.script.run
    .withSuccessHandler(function(result) { hideLoading(); onSuccess(result); })
    .withFailureHandler(function(e) { hideLoading(); showToast(errorMsg || 'エラー', true); });
  runner[funcName].apply(runner, args);
}

/**
 * カスタム確認モーダルを表示する
 * @param {string} title - モーダルのタイトル
 * @param {string} message - 確認メッセージ
 * @param {Function} onConfirm - 確認時のコールバック
 * @param {string} [confirmLabel] - 確認ボタンのラベル（デフォルト: 'OK'）
 */
function showConfirm(title, message, onConfirm, confirmLabel) {
  var container = document.getElementById('modal-container');
  container.innerHTML = '<div class="modal-overlay" id="modal-overlay">' +
    '<div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modal-title">' +
    '<h3 id="modal-title">' + esc(title) + '</h3>' +
    '<p>' + esc(message) + '</p>' +
    '<div class="modal-actions">' +
    '<button class="btn btn-secondary" id="modal-cancel">キャンセル</button>' +
    '<button class="btn btn-primary" id="modal-confirm">' + esc(confirmLabel || 'OK') + '</button>' +
    '</div></div></div>';
  document.getElementById('modal-cancel').onclick = function() { container.innerHTML = ''; };
  document.getElementById('modal-confirm').onclick = function() { container.innerHTML = ''; onConfirm(); };
  document.getElementById('modal-overlay').onclick = function(e) {
    if (e.target === this) container.innerHTML = '';
  };
  document.getElementById('modal-confirm').focus();
}

// ===================================
// UI更新ヘルパー
// ===================================

/**
 * ステップインジケーターを更新する
 * @param {number} activeStep - アクティブなステップ（1, 2, 3）
 */
function updateStepIndicator(activeStep) {
  var steps = document.querySelectorAll('#round-steps .step');
  steps.forEach(function(step, idx) {
    step.classList.remove('active', 'done');
    if (idx + 1 < activeStep) step.classList.add('done');
    else if (idx + 1 === activeStep) step.classList.add('active');
  });
}

/**
 * ステータスバッジのHTMLを生成
 * @param {string} status - ステータス文字列
 * @return {string} バッジHTML
 */
function statusBadgeHtml(status) {
  var s = status || '準備中';
  var bc = 'badge-preparing';
  if (s === '完了') bc = 'badge-done';
  else if (s === '試合終了') bc = 'badge-ended';
  else if (s === '進行中') bc = 'badge-ongoing';
  return '<span class="event-status-badge ' + bc + '">' + esc(s) + '</span>';
}

/**
 * イベントリストアイテムのHTMLを生成
 * @param {Object} ev - イベントオブジェクト
 * @param {string} onclickExpr - onclick式
 * @return {string} HTML文字列
 */
function eventItemHtml(ev, onclickExpr) {
  return '<div class="event-item" onclick="' + onclickExpr + '">' +
    '<div class="event-info"><div class="event-name">' + esc(ev['名称'] || '') + '</div>' +
    '<div class="event-date">' + esc(String(ev['日付'] || '')) + '</div></div>' +
    statusBadgeHtml(ev['ステータス']) + '</div>';
}

// ===================================
// ページ遷移
// ===================================

/**
 * ページを表示する
 * @param {string} page - ページID
 * @param {boolean} [skipHash] - URL更新をスキップするか
 */
function showPage(page, skipHash) {
  // ホームへのアクセスはログイン状態に応じてリダイレクト
  if (page === 'home') page = currentRole ? 'events' : 'login';
  // 未ログインでイベント一覧にアクセスした場合はログインへ
  if (page === 'events' && !currentRole) page = 'login';

  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById('page-' + page).classList.add('active');

  // イベント一覧に戻る場合、詳細ビューをリセット
  if (page === 'events' && currentRole === 'admin') {
    currentEventId = null;
    document.getElementById('event-detail-view').style.display = 'none';
    document.getElementById('event-list-view').style.display = 'block';
    loadEventList();
  }
  if (!skipHash) pushState_();
}

/**
 * タブを切り替える
 * @param {string} tabId - タブID
 * @param {boolean} [skipHash] - URL更新をスキップするか
 */
function switchTab(tabId, skipHash) {
  document.querySelectorAll('.tab-content').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById(tabId).classList.add('active');
  var btn = document.querySelector('[data-tab="' + tabId + '"]');
  if (btn) btn.classList.add('active');
  if (tabId === 'tab-results') renderEventStats();
  if (!skipHash) pushState_();
}

// ===================================
// URLルーティング（google.script.history API）
// ===================================

/** タブIDからURLパラメータ値へのマッピング */
var TAB_TO_PARAM_ = { 'tab-members': 'members', 'tab-rounds': 'rounds', 'tab-results': 'results' };
var PARAM_TO_TAB_ = { 'members': 'tab-members', 'rounds': 'tab-rounds', 'results': 'tab-results' };

/**
 * 現在の画面状態をURLに反映する（pushで履歴に追加）
 */
function pushState_() {
  var state = buildState_();
  google.script.history.push(state, state.params);
}

/**
 * 現在の画面状態からstateオブジェクトを生成する
 * @return {Object}
 */
function buildState_() {
  var params = {};
  var activePage = document.querySelector('.page.active');
  if (activePage) {
    var pageId = activePage.id.replace('page-', '');
    params.page = pageId;
    if (pageId === 'events' && currentEventId) {
      params.event = currentEventId;
      var activeTabEl = document.querySelector('.tab-content.active');
      if (activeTabEl && TAB_TO_PARAM_[activeTabEl.id]) {
        params.tab = TAB_TO_PARAM_[activeTabEl.id];
      } else {
        params.tab = 'members';
      }
    }
    if (currentRole) {
      params.role = currentRole;
    }
  }
  return { params: params, page: params.page, event: params.event, tab: params.tab };
}

/**
 * URLパラメータからルート情報を解析する
 * @param {Object} params URLパラメータオブジェクト
 * @return {{ page: string, eventId: string|null, tab: string|null }}
 */
function parseParams_(params) {
  if (!params) return { page: 'home', eventId: null, tab: null };
  var page = params.page || 'home';
  if (typeof page === 'object') page = page[0];
  var eventId = params.event || null;
  if (typeof eventId === 'object') eventId = eventId[0];
  var tabParam = params.tab || 'members';
  if (typeof tabParam === 'object') tabParam = tabParam[0];
  var tab = PARAM_TO_TAB_[tabParam] || 'tab-members';
  if (page === 'events' && eventId) {
    return { page: 'events', eventId: eventId, tab: tab };
  }
  return { page: page, eventId: null, tab: null };
}

/**
 * ルート情報に基づいて画面を復元する
 * @param {{ page: string, eventId: string|null, tab: string|null }} route
 */
function navigateToRoute_(route) {
  // ロールが未設定の場合はログイン画面へ
  if (!currentRole) {
    showPage('login', true);
    return;
  }
  if (route.eventId) {
    // イベント詳細に直接遷移（一覧読み込みをスキップ）
    document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
    document.getElementById('page-events').classList.add('active');
    openEvent(route.eventId, route.tab, true);
  } else if (currentRole === 'admin') {
    showPage('events', true);
  } else {
    showPage('login', true);
  }
}

// ===================================
// 初期化
// ===================================

document.addEventListener('DOMContentLoaded', function() {
  // 日付入力の初期値設定
  var di = document.getElementById('ev-date');
  if (di) {
    var t = new Date();
    di.value = t.getFullYear() + '-' + String(t.getMonth() + 1).padStart(2, '0') + '-' + String(t.getDate()).padStart(2, '0');
  }

  // メンバー名入力でEnterキー対応
  var nameInput = document.getElementById('m-name');
  if (nameInput) {
    nameInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); addToQueue(); }
    });
  }

  // ログインコード入力でEnterキー対応
  var codeInput = document.getElementById('login-code');
  if (codeInput) {
    codeInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); doLoginWithCode(); }
    });
  }

  // パスワード入力でEnterキー対応
  var passInput = document.getElementById('login-password');
  if (passInput) {
    passInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); doLoginAdmin(); }
    });
  }

  // ブラウザの戻る/進むボタン対応
  google.script.history.setChangeHandler(function(e) {
    var params = (e && e.location && e.location.parameter) ? e.location.parameter : {};
    var route = parseParams_(params);
    navigateToRoute_(route);
  });

  // 初回読み込み: セッション復元またはログイン画面を表示
  var session = loadSession_();
  if (session) {
    setRole_(session.role);
    // URLパラメータを確認し、eventがあればそちらを優先
    google.script.url.getLocation(function(location) {
      var params = (location && location.parameter) ? location.parameter : {};
      var route = parseParams_(params);
      if (route.eventId) {
        document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
        document.getElementById('page-events').classList.add('active');
        openEvent(route.eventId, route.tab, true);
      } else if (session.role === 'admin') {
        showPage('events', true);
        google.script.history.replace({ page: 'events' }, { page: 'events' });
      } else if (session.eventId) {
        document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
        document.getElementById('page-events').classList.add('active');
        openEvent(session.eventId, null, true);
      } else {
        showPage('login', true);
      }
    });
  } else {
    showPage('login', true);
  }
});
</script>
