<script>
// ===================================
// Salu-Rec - クライアントサイドJS
// ===================================

// --- 状態 ---
var currentEventId = null;
var currentMembers = [];
var cachedRounds = [];    // ラウンド一覧（マッチ含む）
var previewTeams = [];    // チーム分けプレビュー: [ [id,...], ... ]
var previewNames = [];    // チーム名: [ 'チームA', ... ]
var selectedMatchA = -1;
var selectedMatchB = -1;
var currentRoundId = null; // 現在操作中のラウンドID
var goalCounts = {};
var currentRole = null;    // 'admin' or 'user' or null
var currentEventStatus = null; // イベントのステータス

// --- チームカラーマッピング ---
var TEAM_CLASSES_ = ['a', 'b', 'c', 'd', 'e'];

// --- SVGアイコンヘルパー ---
function svg(paths, size) {
  size = size || 14;
  return '<svg aria-hidden="true" style="width:' + size + 'px;height:' + size + 'px;display:inline;vertical-align:middle;' +
    'stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;" viewBox="0 0 24 24">' +
    paths + '</svg>';
}
var IC = {
  goal: '<circle cx="12" cy="12" r="10"/>',
  trophy: '<path d="M6 9H4.5a2.5 2.5 0 0 1 0-5C7 4 9 7 12 7s5-3 7.5-3a2.5 2.5 0 0 1 0 5H18"/><path d="M18 9v10a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V9"/><path d="M12 7v14"/>',
  check: '<polyline points="20 6 9 17 4 12"/>',
  x: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
  minus: '<line x1="5" y1="12" x2="19" y2="12"/>',
  file: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>',
  trash: '<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>',
  flag: '<path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/>'
};

// --- ユーティリティ ---
function esc(t) { var d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function showLoading(msg, sub) {
  var el = document.getElementById('loading');
  var content = el.querySelector('.loading-content');
  if (msg) {
    content.innerHTML = '<div class="spinner"></div><p>' + esc(msg) + '</p>' +
      (sub ? '<p class="loading-sub">' + esc(sub) + '</p>' : '');
  } else {
    content.innerHTML = '<div class="spinner"></div>';
  }
  el.style.display = 'flex';
}
function hideLoading() {
  var el = document.getElementById('loading');
  el.style.display = 'none';
  // スピナーを元に戻す
  var content = el.querySelector('.loading-content');
  content.innerHTML = '<div class="spinner"></div>';
}
function showToast(msg, err) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (err ? ' error' : '');
  setTimeout(function() { t.className = 'toast'; }, 2500);
}

function callServer(funcName, args, onSuccess, errorMsg) {
  showLoading();
  var runner = google.script.run
    .withSuccessHandler(function(result) { hideLoading(); onSuccess(result); })
    .withFailureHandler(function(e) { hideLoading(); showToast(errorMsg || 'エラー', true); });
  runner[funcName].apply(runner, args);
}

/**
 * カスタム確認モーダルを表示する
 * @param {string} title - モーダルのタイトル
 * @param {string} message - 確認メッセージ
 * @param {Function} onConfirm - 確認時のコールバック
 * @param {string} [confirmLabel] - 確認ボタンのラベル（デフォルト: 'OK'）
 */
function showConfirm(title, message, onConfirm, confirmLabel) {
  var container = document.getElementById('modal-container');
  container.innerHTML = '<div class="modal-overlay" id="modal-overlay">' +
    '<div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modal-title">' +
    '<h3 id="modal-title">' + esc(title) + '</h3>' +
    '<p>' + esc(message) + '</p>' +
    '<div class="modal-actions">' +
    '<button class="btn btn-secondary" id="modal-cancel">キャンセル</button>' +
    '<button class="btn btn-primary" id="modal-confirm">' + esc(confirmLabel || 'OK') + '</button>' +
    '</div></div></div>';
  document.getElementById('modal-cancel').onclick = function() { container.innerHTML = ''; };
  document.getElementById('modal-confirm').onclick = function() { container.innerHTML = ''; onConfirm(); };
  document.getElementById('modal-overlay').onclick = function(e) {
    if (e.target === this) container.innerHTML = '';
  };
  // フォーカスを確認ボタンに移動
  document.getElementById('modal-confirm').focus();
}

/**
 * ステップインジケーターを更新する
 * @param {number} activeStep - アクティブなステップ（1, 2, 3）
 */
function updateStepIndicator(activeStep) {
  var steps = document.querySelectorAll('#round-steps .step');
  steps.forEach(function(step, idx) {
    step.classList.remove('active', 'done');
    if (idx + 1 < activeStep) step.classList.add('done');
    else if (idx + 1 === activeStep) step.classList.add('active');
  });
}

function showPage(page, skipHash) {
  // ホームへのアクセスはログイン状態に応じてリダイレクト
  if (page === 'home') page = currentRole ? 'events' : 'login';
  // 未ログインでイベント一覧にアクセスした場合はログインへ
  if (page === 'events' && !currentRole) page = 'login';
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.getElementById('page-' + page).classList.add('active');
  // イベント一覧に戻る場合、詳細ビューをリセット
  if (page === 'events' && currentRole === 'admin') {
    currentEventId = null;
    document.getElementById('event-detail-view').style.display = 'none';
    document.getElementById('event-list-view').style.display = 'block';
    loadEventList();
  }
  if (!skipHash) pushState_();
}

function switchTab(tabId, skipHash) {
  document.querySelectorAll('.tab-content').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById(tabId).classList.add('active');
  var btn = document.querySelector('[data-tab="' + tabId + '"]');
  if (btn) btn.classList.add('active');
  if (tabId === 'tab-results') renderEventStats();
  if (!skipHash) pushState_();
}

function statusBadgeHtml(status) {
  var s = status || '準備中';
  var bc = s === '完了' ? 'badge-done' : (s === '進行中' ? 'badge-ongoing' : 'badge-preparing');
  return '<span class="event-status-badge ' + bc + '">' + esc(s) + '</span>';
}

function eventItemHtml(ev, onclickExpr) {
  return '<div class="event-item" onclick="' + onclickExpr + '">' +
    '<div class="event-info"><div class="event-name">' + esc(ev['名称'] || '') + '</div>' +
    '<div class="event-date">' + esc(String(ev['日付'] || '')) + '</div></div>' +
    statusBadgeHtml(ev['ステータス']) + '</div>';
}

// ===================================
// ログイン・ロール管理
// ===================================

/** セッション有効期限: 24時間（ミリ秒） */
var SESSION_TTL_ = 24 * 60 * 60 * 1000;

/**
 * ログイン状態をlocalStorageに保存する
 */
function saveSession_() {
  try {
    var data = { role: currentRole, eventId: currentEventId, ts: Date.now() };
    localStorage.setItem('futsal_session', JSON.stringify(data));
  } catch (e) { /* localStorage使用不可の場合は無視 */ }
}

/**
 * localStorageからログイン状態を復元する
 * @return {Object|null} { role, eventId } または期限切れ/未保存の場合null
 */
function loadSession_() {
  try {
    var raw = localStorage.getItem('futsal_session');
    if (!raw) return null;
    var data = JSON.parse(raw);
    if (!data.role || !data.ts) return null;
    if (Date.now() - data.ts > SESSION_TTL_) {
      localStorage.removeItem('futsal_session');
      return null;
    }
    return { role: data.role, eventId: data.eventId || null };
  } catch (e) { return null; }
}

/**
 * localStorageのセッションを削除する
 */
function clearSession_() {
  try { localStorage.removeItem('futsal_session'); } catch (e) { /* 無視 */ }
}

/**
 * ロールを設定し、bodyクラスでUI出し分けを制御する
 * @param {string} role - 'admin' or 'user'
 */
function setRole_(role) {
  currentRole = role;
  document.body.classList.remove('role-admin', 'role-user');
  if (role) {
    document.body.classList.add('role-' + role);
  }
  // ヘッダーのログアウトボタン表示制御
  var logoutBtn = document.getElementById('btn-logout');
  if (logoutBtn) {
    logoutBtn.style.display = role ? 'flex' : 'none';
  }
}

/** 管理者ログイン */
function doLoginAdmin() {
  var password = document.getElementById('login-password').value;
  if (!password) { showToast('パスワードを入力してください 🔑', true); return; }
  callServer('loginAdmin', [password], function(r) {
    if (r.success) {
      setRole_('admin');
      saveSession_();
      showPage('events');
    } else {
      showToast(r.message, true);
    }
  }, 'ログインに失敗しました');
}

/** イベントコードでログイン */
function doLoginWithCode() {
  var code = document.getElementById('login-code').value;
  if (!code) { showToast('参加コードを入力してね', true); return; }
  callServer('loginWithCode', [code], function(r) {
    if (r.success) {
      setRole_('user');
      // イベント詳細に直接遷移
      document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
      document.getElementById('page-events').classList.add('active');
      openEvent(r.eventId);
      // openEvent完了後にeventIdが設定されるので少し遅延して保存
      setTimeout(function() { saveSession_(); }, 500);
    } else {
      showToast(r.message, true);
    }
  }, 'ログインに失敗しました');
}

/** 管理者ログインフォームの表示切り替え */
function toggleAdminLogin() {
  var form = document.getElementById('admin-login-form');
  form.style.display = form.style.display === 'none' ? 'block' : 'none';
  if (form.style.display === 'block') {
    document.getElementById('login-password').focus();
  }
}

/** ログアウト */
function doLogout() {
  currentRole = null;
  currentEventId = null;
  document.body.classList.remove('role-admin', 'role-user');
  clearSession_();
  // ヘッダーのログアウトボタンを非表示
  var logoutBtn = document.getElementById('btn-logout');
  if (logoutBtn) { logoutBtn.style.display = 'none'; }
  document.getElementById('login-code').value = '';
  document.getElementById('login-password').value = '';
  showPage('login');
}

/** 現在のロールが管理者かどうか */
function isAdmin() {
  return currentRole === 'admin';
}

// ===================================
// イベント一覧
// ===================================
function loadEventList() { callServer('getEvents', [], function(events) { renderEventList(events); }, '読み込みエラー'); }
function renderEventList(events) {
  var c = document.getElementById('event-list');
  if (!events || events.length === 0) { c.innerHTML = '<div class="empty-state">まだイベントがありません。最初の一歩を踏み出そう！</div>'; return; }
  c.innerHTML = events.map(function(ev) { return eventItemHtml(ev, "openEvent('" + ev['イベントID'] + "')"); }).join('');
}
function createNewEvent() {
  var name = document.getElementById('ev-name').value.trim() || 'フットサル';
  var date = document.getElementById('ev-date').value || new Date().toLocaleDateString('ja-JP');
  var code = document.getElementById('ev-code').value.trim();
  if (!code) { showToast('参加コードを入力してください', true); return; }
  callServer('createNewEvent', [date, name, code], function(r) { if (r.success) { showToast(r.message); openEvent(r.eventId); } else showToast(r.message, true); });
}


// ===================================
// イベント詳細
// ===================================
function openEvent(eventId, activeTab, skipHash) {
  currentEventId = eventId;
  callServer('getEventDetail', [eventId], function(d) {
    if (!d) { showToast('イベントが見つかりません', true); return; }
    currentMembers = d.members;
    cachedRounds = d.rounds;
    previewTeams = [];
    previewNames = [];
    currentRoundId = null;
    renderEventDetail(d, activeTab);
    if (!skipHash) pushState_();
  }, 'エラー');
}

function renderEventDetail(d, activeTab) {
  document.getElementById('event-list-view').style.display = 'none';
  document.getElementById('event-detail-view').style.display = 'block';
  var ev = d.event;
  currentEventStatus = ev['ステータス'] || '準備中';
  document.getElementById('ev-detail-title').innerHTML =
    '<svg class="section-icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>' +
    '<line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> ' +
    esc(ev['名称'] || '') + ' <span class="event-date" style="margin-left:8px;">' + esc(String(ev['日付'] || '')) + '</span>';
  // ステータスと削除ボタン（管理者のみ）
  var statusH = statusBadgeHtml(ev['ステータス']);
  if (isAdmin()) {
    statusH += ' <button class="btn btn-sm btn-danger" onclick="deleteCurrentEvent()" style="margin-left:8px;">' + svg(IC.trash, 14) + '</button>';
  }
  document.getElementById('ev-detail-status').innerHTML = statusH;
  // イベントコード表示（管理者のみ）
  var codeEl = document.getElementById('ev-detail-code');
  if (codeEl && ev['コード']) {
    codeEl.innerHTML = '<div class="event-code">参加コード: <span class="event-code-value">' + esc(ev['コード']) + '</span></div>';
  }
  renderMemberList(d.members);
  renderParticipantCB(d.members);
  renderRoundsList(d.rounds);
  renderPostMatch(ev, d.rounds, d.mvpResults);
  // チーム分けボードリセット
  document.getElementById('split-step1').style.display = 'block';
  document.getElementById('split-step2').style.display = 'none';
  document.getElementById('split-board').innerHTML = '';
  document.getElementById('btn-create-round').style.display = 'none';
  boardState = { pool: [], teams: [] };
  boardNames = [];
  // 進行中ラウンドがあればチーム分けUIを非表示
  var hasOngoing = (d.rounds || []).some(function(r) { return r.status !== '終了'; });
  document.getElementById('round-create-section').style.display = hasOngoing ? 'none' : '';
  updateTeamCountOptions();
  switchTab(activeTab || 'tab-members');
}

function backToEventList() {
  document.getElementById('event-detail-view').style.display = 'none';
  document.getElementById('event-list-view').style.display = 'block';
  currentEventId = null;
  loadEventList();
  pushState_();
}

function deleteCurrentEvent() {
  showConfirm('イベント削除', 'このイベントと全データを削除しますか？', function() {
    callServer('deleteEvent', [currentEventId], function(r) { showToast(r.message, !r.success); if (r.success) backToEventList(); });
  }, '削除する');
}

// ===================================
// URLルーティング（google.script.history API）
// ===================================

/** タブIDからURLパラメータ値へのマッピング */
var TAB_TO_PARAM_ = { 'tab-members': 'members', 'tab-rounds': 'rounds', 'tab-results': 'results' };
var PARAM_TO_TAB_ = { 'members': 'tab-members', 'rounds': 'tab-rounds', 'results': 'tab-results' };

/**
 * 現在の画面状態をURLに反映する（pushで履歴に追加）
 */
function pushState_() {
  var state = buildState_();
  google.script.history.push(state, state.params);
}

/**
 * 現在の画面状態からstateオブジェクトを生成する
 * @return {Object}
 */
function buildState_() {
  var params = {};
  var activePage = document.querySelector('.page.active');
  if (activePage) {
    var pageId = activePage.id.replace('page-', '');
    params.page = pageId;
    if (pageId === 'events' && currentEventId) {
      params.event = currentEventId;
      var activeTabEl = document.querySelector('.tab-content.active');
      if (activeTabEl && TAB_TO_PARAM_[activeTabEl.id]) {
        params.tab = TAB_TO_PARAM_[activeTabEl.id];
      } else {
        params.tab = 'members';
      }
    }
    if (currentRole) {
      params.role = currentRole;
    }
  }
  return { params: params, page: params.page, event: params.event, tab: params.tab };
}

/**
 * URLパラメータからルート情報を解析する
 * @param {Object} params URLパラメータオブジェクト
 * @return {{ page: string, eventId: string|null, tab: string|null }}
 */
function parseParams_(params) {
  if (!params) return { page: 'home', eventId: null, tab: null };
  var page = params.page || 'home';
  if (typeof page === 'object') page = page[0];
  var eventId = params.event || null;
  if (typeof eventId === 'object') eventId = eventId[0];
  var tabParam = params.tab || 'members';
  if (typeof tabParam === 'object') tabParam = tabParam[0];
  var tab = PARAM_TO_TAB_[tabParam] || 'tab-members';
  if (page === 'events' && eventId) {
    return { page: 'events', eventId: eventId, tab: tab };
  }
  return { page: page, eventId: null, tab: null };
}

/**
 * ルート情報に基づいて画面を復元する
 * @param {{ page: string, eventId: string|null, tab: string|null }} route
 */
function navigateToRoute_(route) {
  // ロールが未設定の場合はログイン画面へ
  if (!currentRole) {
    showPage('login', true);
    return;
  }
  if (route.eventId) {
    // イベント詳細に直接遷移（一覧読み込みをスキップ）
    document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
    document.getElementById('page-events').classList.add('active');
    openEvent(route.eventId, route.tab, true);
  } else if (currentRole === 'admin') {
    showPage('events', true);
  } else {
    showPage('login', true);
  }
}

// ===================================
// 初期化
// ===================================
document.addEventListener('DOMContentLoaded', function() {
  var di = document.getElementById('ev-date');
  if (di) { var t = new Date(); di.value = t.getFullYear() + '-' + String(t.getMonth() + 1).padStart(2, '0') + '-' + String(t.getDate()).padStart(2, '0'); }
  var nameInput = document.getElementById('m-name');
  if (nameInput) { nameInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); addToQueue(); } }); }
  // ログインコード入力でEnterキー対応
  var codeInput = document.getElementById('login-code');
  if (codeInput) { codeInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); doLoginWithCode(); } }); }
  var passInput = document.getElementById('login-password');
  if (passInput) { passInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); doLoginAdmin(); } }); }

  // ブラウザの戻る/進むボタン対応
  google.script.history.setChangeHandler(function(e) {
    var params = (e && e.location && e.location.parameter) ? e.location.parameter : {};
    var route = parseParams_(params);
    navigateToRoute_(route);
  });

  // 初回読み込み: セッション復元またはログイン画面を表示
  var session = loadSession_();
  if (session) {
    setRole_(session.role);
    if (session.role === 'admin') {
      showPage('events', true);
      google.script.history.replace({ page: 'events' }, { page: 'events' });
    } else if (session.eventId) {
      document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
      document.getElementById('page-events').classList.add('active');
      openEvent(session.eventId, null, true);
    } else {
      showPage('login', true);
    }
  } else {
    showPage('login', true);
  }
});
</script>
